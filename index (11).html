  function renderPrivacy(){
    const clrBtn=el("button",{style:{background:C.red+"18",border:`1px solid ${C.red}33`,borderRadius:"12px",padding:"12px 16px",color:C.red,fontSize:"14px",width:"100%"}},"🗑️ Borrar todos los chats");
    clrBtn.addEventListener("click",()=>{if(confirm("¿Borrar todos los chats?"))saveChats({})});
    const expBtn=el("button",{style:{background:C.s2,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"12px 16px",color:C.text,fontSize:"14px",width:"100%",marginTop:"8px"}},"📤 Exportar datos");
    expBtn.addEventListener("click",()=>{
      const d={chars:state.chars,chats:state.chats,cfg:state.cfg,ts:new Date().toISOString()};
      const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:"application/json"}));a.download="aichat-backup.json";a.click();
    });
    const impInp=el("input",{type:"file",accept:".json",style:{display:"none"}});
    const impBtn=el("button",{style:{background:C.s2,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"12px 16px",color:C.text,fontSize:"14px",width:"100%",marginTop:"8px"}},"📥 Importar datos");
    impBtn.addEventListener("click",()=>impInp.click());
    impInp.addEventListener("change",async e=>{
      const f=e.target.files[0];if(!f)return;
      try{const d=JSON.parse(await f.text());if(d.chars)saveChars(d.chars);if(d.chats)saveChats(d.chats);if(d.cfg)saveCfg(d.cfg);alert("Importado ✓");render();}
      catch{alert("Error al importar");}
    });
    return el("div",{},clrBtn,expBtn,impInp,impBtn);
  }

  function renderInfo(){
    return el("div",{style:{background:C.s2,borderRadius:"13px",padding:"16px",fontSize:"13px",color:"#ccc",lineHeight:"1.8"}},
      el("b",{style:{color:"#a78bfa"}},"🤖 Motores recomendados"),
      el("p",{style:{margin:"8px 0"}},"• Groq — Llama 4 Scout (rápido, gratis)\n• Claude Sonnet 4 (multimodal)\n• Gemini 2.5 Flash (gratis con límites)"),
      el("hr",{style:{margin:"10px 0",border:"none",borderTop:`1px solid ${C.border}`}}),
      el("b",{style:{color:"#a78bfa"}},"🏷️ Sistema de etiquetas"),
      el("p",{style:{margin:"8px 0"}},"La IA lee etiquetas y elige cuándo enviar cada archivo por contexto. Usa tags como: selfie, íntima, playa, gym, etc."),
      el("hr",{style:{margin:"10px 0",border:"none",borderTop:`1px solid ${C.border}`}}),
      el("b",{style:{color:"#a78bfa"}},"📱 Instalar en móvil"),
      el("p",{style:{margin:"8px 0"}},"Chrome Android → Menú ⋮ → Añadir a pantalla inicio"),
      el("hr",{style:{margin:"10px 0",border:"none",borderTop:`1px solid ${C.border}`}}),
      el("b",{style:{color:"#a78bfa"}},"🐙 GitHub Pages"),
      el("p",{style:{margin:"8px 0"}},"1. Crea repositorio en github.com\n2. Sube index.html\n3. Settings → Pages → Deploy from branch (main)\n4. Accede en username.github.io/repo")
    );
  }

  function rebuild(){
    body.innerHTML="";
    body.appendChild(navBtns());
    if(section==="models")body.appendChild(renderModels());
    else if(section==="appearance")body.appendChild(renderAppearance());
    else if(section==="privacy")body.appendChild(renderPrivacy());
    else body.appendChild(renderInfo());
  }
  rebuild();

  return Wrap(
    hdrBar(ghostBtn("← Atrás",()=>nav("home")),"Configuración",
      ghostBtn("Guardar",()=>{saveCfg(cfg);nav("home")},{fontWeight:"700"})),
    body
  );
}

/* ─── CHARACTER FORM ──────────────────────────────────────── */
function renderForm(){
  const char=state.editing;
  let name=char?.name||"",pers=char?.personality||"",opener=char?.opener||"",mood=char?.mood||"";
  let emojiLevel = char?.emojiLevel!=null ? char.emojiLevel : 40;
  let typoLevel = char?.typoLevel!=null ? char.typoLevel : 20;
  let capsStyle = char?.capsStyle || "normal";
  let archetype = char?.archetype || "";
  let region = char?.region || "";
  let avUrl=char?.avatar?.url||"";
  let media=[...(char?.media||[])];
  let charPid=char?.providerId||DEF_PROVIDER;
  let charMid=char?.modelId||DEF_MODELS[charPid];
  const busyIds=new Set();

  const avRef=el("input",{type:"file",accept:"image/*",style:{display:"none"}});
  const medRef=el("input",{type:"file",accept:"image/*,video/*",multiple:"",style:{display:"none"}});

  const nameInp=el("input",{placeholder:"Nombre del personaje",style:INP});nameInp.value=name;nameInp.addEventListener("input",e=>name=e.target.value);
  const persInp=el("textarea",{rows:"4",placeholder:"Personalidad, forma de hablar, contexto…\nEj: Eres Luna, 22 años, extrovertida y cariñosa.",style:{...INP,lineHeight:"1.55"}});persInp.value=pers;persInp.addEventListener("input",e=>pers=e.target.value);
  const openerInp=el("input",{placeholder:"Primer mensaje (vacío = se genera solo)",style:INP});openerInp.value=opener;openerInp.addEventListener("input",e=>opener=e.target.value);
  const moodInp=el("input",{placeholder:"Estado de ánimo actual (opcional)",style:INP});moodInp.value=mood;moodInp.addEventListener("input",e=>mood=e.target.value);

  // ── Sliders: nivel de autonomía y nivel de coqueteo ──
  let autonomy = char?.autonomy!=null ? char.autonomy : 50;
  let flirt = char?.flirt!=null ? char.flirt : 30;

  function makeSlider(initial, leftLbl, rightLbl, onChange){
    const wrap=el("div",{style:{display:"flex",flexDirection:"column",gap:"6px"}});
    const valLbl=el("span",{style:{fontSize:"11px",color:C.muted,fontWeight:"600"}});
    const range=el("input",{type:"range",min:"0",max:"100",step:"1",style:{width:"100%",accentColor:"#833ab4"}});
    range.value=String(initial);
    function refreshLbl(){ valLbl.textContent = range.value+"%"; }
    refreshLbl();
    range.addEventListener("input",e=>{ onChange(parseInt(e.target.value,10)); refreshLbl(); });
    const row=el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"10px",color:C.muted}},
      el("span",{},leftLbl), valLbl, el("span",{},rightLbl)
    );
    wrap.appendChild(row); wrap.appendChild(range);
    wrap.setValue=(v)=>{ range.value=String(v); refreshLbl(); };
    return wrap;
  }

  const autonomySlider = makeSlider(autonomy, "Complaciente", "Independiente", v=>autonomy=v);
  const flirtSlider = makeSlider(flirt, "Reservado/a", "Coqueto/a", v=>flirt=v);
  const emojiSlider = makeSlider(emojiLevel, "Casi sin emojis", "Muchos emojis", v=>emojiLevel=v);
  const typoSlider = makeSlider(typoLevel, "Ortografía prolija", "Typos frecuentes", v=>typoLevel=v);

  // Selector de estilo de mayúsculas
  const capsWrap=el("div",{style:{display:"flex",gap:"7px"}});
  function buildCapsBtns(){
    capsWrap.innerHTML="";
    const opts=[["normal","Aa Normal"],["lower","todo minúscula"]];
    for(const[val,label]of opts){
      const active=capsStyle===val;
      const b=el("button",{style:{
        flex:"1",padding:"9px 10px",borderRadius:"9px",fontSize:"12px",fontWeight:"600",cursor:"pointer",
        background:active?C.s3:C.s2,border:active?"1.5px solid #833ab488":`1.5px solid ${C.border}`,
        color:active?"#e879f9":C.muted,
      }},label);
      b.addEventListener("click",()=>{capsStyle=val;buildCapsBtns();});
      capsWrap.appendChild(b);
    }
  }
  buildCapsBtns();

  // Selector de región / modismos
  const REGION_OPTS=[["","Sin región específica"],["mx","🇲🇽 México"],["ar","🇦🇷 Argentina"],["es","🇪🇸 España"],["co","🇨🇴 Colombia"],["cl","🇨🇱 Chile"],["pe","🇵🇪 Perú"],["ve","🇻🇪 Venezuela"]];
  const regionWrap=el("div",{style:{display:"flex",flexWrap:"wrap",gap:"6px"}});
  function buildRegionBtns(){
    regionWrap.innerHTML="";
    for(const[val,label]of REGION_OPTS){
      const active=region===val;
      const b=el("button",{style:{
        padding:"7px 12px",borderRadius:"16px",fontSize:"12px",fontWeight:"600",cursor:"pointer",
        background:active?"#833ab422":C.s2,border:active?"1.5px solid #833ab488":`1.5px solid ${C.border}`,
        color:active?"#e879f9":C.muted,
      }},label);
      b.addEventListener("click",()=>{region=val;buildRegionBtns();});
      regionWrap.appendChild(b);
    }
  }
  buildRegionBtns();

  // Selector de arquetipo: aplica un combo coherente de campos con un click
  const archWrap=el("div",{style:{display:"flex",flexWrap:"wrap",gap:"6px"}});
  function buildArchBtns(){
    archWrap.innerHTML="";
    for(const[key,a]of Object.entries(ARCHETYPES)){
      const active=archetype===key;
      const b=el("button",{style:{
        display:"flex",alignItems:"center",gap:"6px",padding:"8px 12px",borderRadius:"20px",fontSize:"12px",fontWeight:"600",cursor:"pointer",
        background:active?"#833ab422":C.s2,border:active?"1.5px solid #833ab488":`1.5px solid ${C.border}`,
        color:active?"#e879f9":C.text,
      }},a.emoji+" "+a.label);
      b.addEventListener("click",()=>{
        if(pers.trim() && !confirm(`Esto va a reemplazar la personalidad, ánimo y estilo de escritura actuales con la plantilla "${a.label}". ¿Continuar?`)) return;
        archetype=key;
        pers=a.personality; persInp.value=pers;
        mood=a.mood; moodInp.value=mood;
        autonomy=a.autonomy; flirt=a.flirt; emojiLevel=a.emojiLevel; typoLevel=a.typoLevel; capsStyle=a.capsStyle;
        autonomySlider.setValue(autonomy);
        flirtSlider.setValue(flirt);
        emojiSlider.setValue(emojiLevel);
        typoSlider.setValue(typoLevel);
        buildCapsBtns(); buildArchBtns();
      });
      archWrap.appendChild(b);
    }
  }
  buildArchBtns();

  // IG-style avatar with gradient ring
  const avWrap=el("div",{style:{
    cursor:"pointer", position:"relative",
    width:"96px", height:"96px",
    background:IG_GRAD, borderRadius:"50%",
    padding:"3px", flexShrink:"0",
  }});
  function refreshAv(){
    avWrap.innerHTML="";
    const inner=el("div",{style:{
      width:"90px",height:"90px",borderRadius:"50%",
      overflow:"hidden",background:C.s3,border:"2px solid #000",
    }});
    const img=avUrl
      ?el("img",{src:avUrl,style:{width:"100%",height:"100%",objectFit:"cover"}})
      :(()=>{const av=initAv(name||"?");return el("div",{style:{width:"100%",height:"100%",background:av.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:"700",fontSize:"28px"}},av.text)})();
    inner.appendChild(img);
    avWrap.appendChild(inner);
    avWrap.appendChild(el("div",{style:{
      position:"absolute",bottom:"2px",right:"2px",
      background:IG_GRAD,borderRadius:"50%",
      width:"26px",height:"26px",
      display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:"14px",border:"2px solid #000",
    }},"📷"));
  }
  refreshAv();
  avWrap.addEventListener("click",()=>avRef.click());
  avRef.addEventListener("change",async e=>{const f=e.target.files[0];if(!f)return;avUrl=await readFile(f);e.target.value="";refreshAv()});

  // Provider selector
  const provArea=el("div",{style:{display:"flex",flexDirection:"column",gap:"10px"}});
  function rebuildProv(){
    provArea.innerHTML="";
    const grid=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"7px",marginBottom:"10px"}});
    for(const[pid,p]of Object.entries(PROVIDERS)){
      const active=charPid===pid;
      const b=el("button",{style:{
        display:"flex",alignItems:"center",gap:"8px",padding:"10px 13px",
        borderRadius:"11px",cursor:"pointer",transition:"all .12s",textAlign:"left",width:"100%",
        background:active?C.s3:C.s2,
        border: active ? "1.5px solid transparent" : `1.5px solid ${C.border}`,
        backgroundImage: active ? `${IG_GRAD}, linear-gradient(${C.s3},${C.s3})` : "none",
        backgroundOrigin: active ? "border-box" : "none",
        backgroundClip: active ? "padding-box, border-box" : "none",
      }},
        el("span",{style:{fontSize:"17px"}},p.emoji),
        el("div",{style:{flex:"1"}},
          el("div",{style:{fontWeight:"600",fontSize:"12px",color:C.text}},p.name),
          el("div",{style:{fontSize:"10px",color:C.muted}},p.freeNote||"")
        )
      );
      b.addEventListener("click",()=>{charPid=pid;charMid=DEF_MODELS[pid];rebuildProv()});
      grid.appendChild(b);
    }
    provArea.appendChild(grid);
    const p=PROVIDERS[charPid];
    const hasKey=!!getKey(charPid);
    if(!hasKey&&charPid!=="claude"){
      provArea.appendChild(el("div",{style:{background:C.amber+"18",border:`1px solid ${C.amber}33`,borderRadius:"10px",padding:"9px 12px",fontSize:"12px",color:"#fcd34d",marginBottom:"6px"}},
        `⚠️ Sin API key de ${p.name}. Agrégala en ⚙️ → Modelos.`));
    }
    const mdls=el("div",{style:{display:"flex",flexDirection:"column",gap:"3px",background:C.s2,borderRadius:"11px",padding:"8px"}});
    for(const m of p.models){
      const isAct=charMid===m.id;
      const b=el("button",{style:{display:"flex",alignItems:"center",gap:"10px",width:"100%",padding:"9px 12px",borderRadius:"8px",border:"none",cursor:"pointer",background:isAct?p.color+"18":"transparent",textAlign:"left",transition:"background .1s"}},
        el("div",{style:{flex:"1"}},
          el("div",{style:{fontWeight:"600",fontSize:"13px",color:C.text}},m.label),
          el("div",{style:{fontSize:"11px",color:C.muted}},m.desc)
        ),
        badge(m.badge,p.color)
      );
      b.addEventListener("click",()=>{charMid=m.id;rebuildProv()});
      mdls.appendChild(b);
    }
    provArea.appendChild(mdls);
  }
  rebuildProv();

  // Media list with tag editor
  const mediaList=el("div",{style:{display:"flex",flexDirection:"column",gap:"10px"}});

  function makeTagEditor(mItem,onChange){
    const wrap=el("div",{style:{marginTop:"6px"}});
    function parseTags(s){return(s||"").split(",").map(t=>t.trim()).filter(Boolean)}
    function serTags(a){return a.join(", ")}
    let cur=parseTags(mItem.tags);
    const custInp=el("input",{placeholder:"+ custom (Enter)",style:{background:"transparent",border:"none",color:C.muted,fontSize:"11px",outline:"none",padding:"2px 0",minWidth:"80px"}});
    custInp.addEventListener("keydown",e=>{
      if(e.key==="Enter"||e.key===","){e.preventDefault();
        const v=custInp.value.trim().replace(/,/g,"");
        if(v&&!cur.includes(v)){cur=[...cur,v];custInp.value="";refresh();onChange(serTags(cur));}
      }
    });
    function refresh(){
      wrap.innerHTML="";
      for(const[catK,cat]of Object.entries(TAG_CATS)){
        const row=el("div",{style:{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"5px"}});
        row.appendChild(el("span",{style:{fontSize:"10px",color:"#888",minWidth:"40px",paddingTop:"4px",fontWeight:"600",flexShrink:"0"}},cat.label));
        for(const t of cat.tags){
          const sel=cur.includes(t);
          const chip=el("span",{class:`tag-chip ${cat.cls}${sel?" sel":""}`},t);
          chip.addEventListener("click",()=>{cur=sel?cur.filter(x=>x!==t):[...cur,t];onChange(serTags(cur));refresh()});
          row.appendChild(chip);
        }
        wrap.appendChild(row);
      }
      const custom=cur.filter(t=>!Object.values(TAG_CATS).flatMap(c=>c.tags).includes(t));
      if(custom.length){
        const row=el("div",{style:{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"4px"}});
        row.appendChild(el("span",{style:{fontSize:"10px",color:"#888",minWidth:"40px",paddingTop:"4px",fontWeight:"600",flexShrink:"0"}},"Extras"));
        for(const t of custom){
          const chip=el("span",{class:"tag-chip sel"},t," ",el("span",{style:{opacity:".6",fontSize:"12px"}},"×"));
          chip.addEventListener("click",()=>{cur=cur.filter(x=>x!==t);onChange(serTags(cur));refresh()});
          row.appendChild(chip);
        }
        wrap.appendChild(row);
      }
      wrap.appendChild(el("div",{style:{display:"flex",alignItems:"center",gap:"6px",marginTop:"4px"}},
        el("span",{style:{fontSize:"10px",color:C.muted,minWidth:"40px",fontWeight:"600",flexShrink:"0"}},"Custom"),custInp
      ));
    }
    refresh();return wrap;
  }

  function refreshMedia(){
    mediaList.innerHTML="";
    for(const m of media){
      const thumb=m.type==="image"
        ?el("img",{src:m.url,style:{width:"54px",height:"54px",borderRadius:"8px",objectFit:"cover",flexShrink:"0"}})
        :el("div",{style:{width:"54px",height:"54px",borderRadius:"8px",background:C.s3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",flexShrink:"0"}},"🎥");
      const descInp=el("input",{placeholder:"Descripción opcional…",style:{flex:"1",background:"transparent",border:"none",color:C.text,fontSize:"13px",outline:"none",padding:"2px 0"}});
      descInp.value=m.description||"";
      descInp.addEventListener("input",e=>{const i=media.findIndex(x=>x.id===m.id);if(i>=0)media[i]={...media[i],description:e.target.value}});
      const del=el("button",{style:{background:"none",border:"none",color:C.muted,fontSize:"20px",padding:"0",flexShrink:"0",alignSelf:"flex-start"}},"✕");
      del.addEventListener("click",()=>{media=media.filter(x=>x.id!==m.id);refreshMedia()});
      const tagEd=makeTagEditor(m,(t)=>{const i=media.findIndex(x=>x.id===m.id);if(i>=0)media[i]={...media[i],tags:t}});
      mediaList.appendChild(el("div",{style:{background:C.s2,borderRadius:"12px",padding:"10px 12px"}},
        el("div",{style:{display:"flex",alignItems:"flex-start",gap:"10px"}},thumb,el("div",{style:{flex:"1",minWidth:"0"}},descInp),del),
        el("div",{style:{marginTop:"8px",borderTop:`1px solid ${C.border}`,paddingTop:"8px"}},tagEd)
      ));
    }
  }
  refreshMedia();

  medRef.addEventListener("change",async e=>{
    for(const f of Array.from(e.target.files)){
      const isVid=f.type.startsWith("video/");
      const raw=await readFile(f);
      const url=isVid?raw:await resizeImg(raw);
      const item={id:uid(),url,type:isVid?"video":"image",name:f.name,description:"",tags:""};
      media=[...media,item];refreshMedia();
    }
    e.target.value="";
  });

  const addBtn=el("button",{style:{
    background:"transparent", border:`1.5px dashed #333`,
    borderRadius:"10px",padding:"11px",color:C.muted,
    fontSize:"13px",width:"100%",transition:"border-color .12s",
  }},"+ Añadir imagen / video");
  addBtn.addEventListener("click",()=>medRef.click());
  addBtn.addEventListener("mouseenter",()=>addBtn.style.borderColor="#833ab4");
  addBtn.addEventListener("mouseleave",()=>addBtn.style.borderColor="#333");

  function doSave(){
    if(!name.trim())return alert("Escribe un nombre.");
    const saved={
      id:char?.id||uid(),name:name.trim(),personality:pers.trim(),
      opener:opener.trim(),mood:mood.trim(),autonomy,flirt,
      emojiLevel,typoLevel,capsStyle,archetype,region,
      avatar:avUrl?{type:"image",url:avUrl}:initAv(name),
      media,providerId:charPid,modelId:charMid,
    };
    saveChars(char?state.chars.map(c=>c.id===saved.id?saved:c):[...state.chars,saved]);
    state.editing=null;
    nav(char?"chat":"home",char?saved:null);
  }

  const formBody=el("div",{style:{flex:"1",overflowY:"auto",padding:"18px",display:"flex",flexDirection:"column",gap:"20px"}},
    avRef,medRef,
    el("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"8px",paddingBottom:"4px"}},avWrap,el("span",{style:{fontSize:"12px",color:C.muted}},"Foto de perfil")),
    el("div",{},lbl("Nombre"),nameInp),
    el("div",{},lbl("Arquetipo de personalidad (opcional, plantilla rápida)"),archWrap,
      el("p",{style:{fontSize:"11px",color:C.muted,marginTop:"6px",lineHeight:"1.5"}},"Aplica de una sola vez una combinación coherente de personalidad, ánimo y estilo de escritura. Podés seguir editando todo a mano después.")),
    el("div",{},lbl("Personalidad"),persInp),
    el("div",{},lbl("Estado de ánimo (opcional)"),moodInp),
    el("div",{},lbl("Nivel de autonomía"),autonomySlider,
      el("p",{style:{fontSize:"11px",color:C.muted,marginTop:"4px",lineHeight:"1.5"}},"Qué tan dispuesto/a está a seguir pedidos del usuario sin chistar. Bajo = casi siempre accede; alto = decide más por sí mismo/a, duda, pone límites o se niega más seguido.")),
    el("div",{},lbl("Nivel de coqueteo"),flirtSlider,
      el("p",{style:{fontSize:"11px",color:C.muted,marginTop:"4px",lineHeight:"1.5"}},"Qué tan coqueto/a es su tono en general. Bajo = más reservado/a y formal; alto = más insinuante y cariñoso/a (siempre dentro del personaje, sin volverse explícito).")),
    el("div",{},lbl("Uso de emojis"),emojiSlider,
      el("p",{style:{fontSize:"11px",color:C.muted,marginTop:"4px",lineHeight:"1.5"}},"Cuántos emojis usa al escribir, en promedio.")),
    el("div",{},lbl("Frecuencia de typos"),typoSlider,
      el("p",{style:{fontSize:"11px",color:C.muted,marginTop:"4px",lineHeight:"1.5"}},"Qué tan seguido comete (y corrige) errores de tipeo casuales, simulando escribir rápido desde el celular.")),
    el("div",{},lbl("Estilo de mayúsculas"),capsWrap),
    el("div",{},lbl("Región / modismos (opcional)"),regionWrap,
      el("p",{style:{fontSize:"11px",color:C.muted,marginTop:"6px",lineHeight:"1.5"}},"Si elegís una región, el personaje usará modismos y muletillas típicas de esa zona al hablar.")),
    el("div",{},lbl("Primer mensaje (opcional)"),openerInp),
    el("div",{},lbl("Motor AI"),provArea),
    el("div",{},
      el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}},
        lbl("Galería de medios"),el("span",{style:{fontSize:"11px",color:C.muted}},"IA elige por tags + contexto")),
      el("p",{style:{fontSize:"12px",color:C.muted,marginBottom:"10px",lineHeight:"1.5"}},"Añade archivos y elige etiquetas. La IA los envía automáticamente según el contexto."),
      mediaList,el("div",{style:{marginTop:"8px"}},addBtn)
    )
  );

  return Wrap(
    hdrBar(
      ghostBtn("← Cancelar",()=>{state.editing=null;nav(char?"chat":"home",char||null)}),
      char?"Editar personaje":"Nuevo personaje",
      ghostBtn("Guardar",doSave,{fontWeight:"700"})
    ),
    formBody
  );
}

/* ─── CHAT SCREEN (Instagram DM) ─────────────────────────── */
function renderChat(char){
  const cfg=state.cfg;
  const igMode=cfg.igBubbles!==false;
  const userColor=cfg.bubbleColor||C.accent;
  const dens=cfg.chatDensity||"normal";
  const gap=dens==="compact"?"2px":dens==="spacious"?"10px":"4px";

  let messages=[...(state.chats[char.id]||[])];
  let loading=false,menuOpen=false,mpOpen=false;
  let viewed={};
  let reactions=getReactions();
  let sPid=char.providerId||DEF_PROVIDER;
  let sMid=char.modelId||DEF_MODELS[sPid];
  let sChar={...char,providerId:sPid,modelId:sMid};
  let isOnline=true;
  let lastSeenText="visto hace un momento";

  // ── Lifecycle guard ───────────────────────────────────────
  // Evita que timers/respuestas async de ESTA instancia de chat
  // sigan escribiendo estado o tocando el DOM tras navegar a
  // otra pantalla (o re-abrir el mismo chat, p.ej. "Reiniciar chat").
  let destroyed=false;

  // Expose active chat so jealousy system can inject messages live
  window.__activeChatId = char.id;
  window.__activeChatAppend = (msg) => {
    if(destroyed) return;
    messages = [...messages, msg];
    msgArea.appendChild(renderBubble(msg));
    msgArea.appendChild(bref);
    bref.scrollIntoView({behavior:"smooth"});
  };

  // ── Spontaneous message timer ────────────────────────────
  let spontTimer=null;
  let lastActivity=Date.now();
  const SPONT_DELAY_MIN=45000, SPONT_DELAY_MAX=180000;

  // ── "Doble mensaje por las dudas" ──────────────────────────
  // Si el personaje le escribió algo al usuario y este tarda en
  // responder, manda UN mensaje corto de seguimiento (como hace la
  // gente real), distinto del mensaje espontáneo "vida propia".
  let followUpTimer=null;
  const FOLLOWUP_DELAY_MIN=50000, FOLLOWUP_DELAY_MAX=140000;
  const FOLLOWUP_LINES=["?","hola?","sigues ahí?","ahi estas?","me dejaste en visto 😭","jsjs ahi?","oye?","??"];

  function resetFollowUpTimer(){
    if(followUpTimer)clearTimeout(followUpTimer);
    if(destroyed)return;
    const last=messages[messages.length-1];
    // Solo dispara si el ÚLTIMO mensaje de la conversación fue del bot
    // (le escribió al usuario y no hubo respuesta todavía).
    if(!last||last.role!=="assistant")return;
    const wait=FOLLOWUP_DELAY_MIN+Math.random()*(FOLLOWUP_DELAY_MAX-FOLLOWUP_DELAY_MIN);
    followUpTimer=setTimeout(()=>{if(!destroyed)fireFollowUp();},wait);
  }

  async function fireFollowUp(){
    if(destroyed||loading||document.hidden)return;
    const last=messages[messages.length-1];
    if(!last||last.role!=="assistant")return; // el usuario ya respondió, no hace falta
    if(Math.random()>0.55)return; // no siempre lo hace, sería un tic robótico
    const line=FOLLOWUP_LINES[Math.floor(Math.random()*FOLLOWUP_LINES.length)];
    const botMsg={id:uid(),role:"assistant",content:{type:"text",text:line,_followup:true},ts:Date.now()};
    const final=[...messages,botMsg];
    saveMsgs(final);
    if(document.hidden){const nu=getUnread();nu[char.id]=(nu[char.id]||0)+1;setUnread(nu);}
    msgArea.appendChild(renderBubble(botMsg));
    msgArea.appendChild(bref);bref.scrollIntoView({behavior:"smooth"});
  }

  function resetSpontTimer(){
    if(destroyed)return;
    lastActivity=Date.now();
    if(spontTimer)clearTimeout(spontTimer);
    if(messages.length<1)return;
    const wait=SPONT_DELAY_MIN+Math.random()*(SPONT_DELAY_MAX-SPONT_DELAY_MIN);
    spontTimer=setTimeout(()=>{if(!destroyed)fireSpont();},wait);
  }

  async function fireSpont(){
    if(destroyed||loading||document.hidden)return;
    const sentSet=getSentIndices(messages);
    const pid=sChar.providerId,mid=sChar.modelId,apiKey=getKey(pid);
    if(!apiKey&&pid!=="claude")return;
    const hasUnsentMedia=(sChar.media||[]).some((_,i)=>!sentSet.has(i));
    const withMedia=hasUnsentMedia&&Math.random()<0.35;
    setLoading(true,"escribiendo…");
    try{
      const system=buildSystem(sChar,sentSet,{spontaneous:true});
      const recentCtx=messages.slice(-6);
      const prompt=withMedia
        ?"[Sistema interno: envía un mensaje espontáneo. Puedes incluir archivo de galería si tiene sentido.]"
        :"[Sistema interno: envía un mensaje espontáneo corto, como si te acordaras del usuario. Solo texto.]";
      const fakeHistory=[...recentCtx,{id:"_sp",role:"user",content:{type:"text",text:prompt}}];
      const reply=await callAPI({providerId:pid,apiKey,modelId:mid,system,messages:fakeHistory,maxTokens:200});
      if(destroyed)return;
      const{parts,picked,viewMode}=parseReply(reply,sChar.media||[]);
      if((!parts.length||!parts[0])&&!picked){setLoading(false);resetSpontTimer();return;}
      let final=messages;
      for(let i=0;i<parts.length;i++){
        const partText=parts[i];
        const isLast=i===parts.length-1;
        await delay(Math.min(typingMs(partText),2000));
        if(destroyed)return;
        if(i>0) setLoading(true,"escribiendo…");
        const pickedIdx=(isLast&&picked)?(sChar.media||[]).indexOf(picked):-1;
        const ac=(isLast&&picked)
          ?{type:"media",mediaType:picked.type,url:picked.url,text:partText,viewMode,description:picked.description,galleryIdx:pickedIdx}
          :{type:"text",text:partText};
        const botMsg={id:uid(),role:"assistant",content:ac,ts:Date.now()};
        final=[...final,botMsg];
        saveMsgs(final);
        if(isLast) setLoading(false);
        // Bump unread count if page hidden
        if(document.hidden){
          const nu=getUnread();nu[char.id]=(nu[char.id]||0)+1;setUnread(nu);
        }
        msgArea.appendChild(renderBubble(botMsg));
        msgArea.appendChild(bref);bref.scrollIntoView({behavior:"smooth"});
        if(!isLast) await delay(400+Math.random()*700);
      }
      resetSpontTimer();
      resetFollowUpTimer();
    }catch{if(!destroyed){setLoading(false);resetSpontTimer();}}
  }

  function saveMsgs(m){messages=[...m];saveChats({...state.chats,[char.id]:m})}

  // Status bar
  const sdot=el("span",{style:{width:"8px",height:"8px",borderRadius:"50%",background:C.green,display:"inline-block",flexShrink:"0"}});
  const slbl=el("span",{style:{fontSize:"11px",color:C.muted,marginLeft:"4px"}},"Activo ahora");
  let statusAnim=null;
  function setStatus(t,typing=false){
    if(typing){
      slbl.style.color="#a78bfa";slbl.textContent=t;
      sdot.style.background="#a78bfa";
    } else {
      slbl.style.color=C.muted;slbl.textContent=t;
      sdot.style.background=C.green;
    }
  }

  const msgArea=el("div",{style:{
    flex:"1",overflowY:"auto",padding:"8px 12px 4px",
    display:"flex",flexDirection:"column",gap,
    backgroundImage:"none",
  }});
  const bref=el("div");

  // ── Lightbox ─────────────────────────────────────────────
  const lbRoot=document.getElementById("lb-root");
  lbRoot.innerHTML="";
  const lb=el("div",{class:"lb-overlay"});
  const lbM=el("div",{style:{maxWidth:"100%",maxHeight:"80vh",display:"flex",alignItems:"center",justifyContent:"center"}});
  const lbH=el("div",{style:{marginTop:"12px",fontSize:"12px",color:"#aaa",display:"none"}},"👁 Solo se puede ver una vez");
  const lbX=el("button",{style:{position:"absolute",top:"16px",right:"16px",background:"rgba(255,255,255,.1)",border:"none",borderRadius:"50%",width:"40px",height:"40px",color:"#fff",fontSize:"20px"}},"✕");
  lb.appendChild(lbM);lb.appendChild(lbH);lb.appendChild(lbX);
  lbRoot.appendChild(lb);
  let lbCb=null;
  function openLb(c,onClose=null){
    lbM.innerHTML="";
    if(c.mediaType==="video")lbM.appendChild(el("video",{src:c.url,controls:"",autoplay:"",style:{maxWidth:"100%",maxHeight:"75vh",borderRadius:"10px"}}));
    else lbM.appendChild(el("img",{src:c.url,style:{maxWidth:"100%",maxHeight:"75vh",borderRadius:"10px",objectFit:"contain"}}));
    lbH.style.display=c.viewMode==="once"?"block":"none";
    lbCb=onClose;lb.style.display="flex";
  }
  function closeLb(){lb.style.display="none";lbM.innerHTML="";if(lbCb){lbCb();lbCb=null;}}
  lbX.addEventListener("click",closeLb);
  lb.addEventListener("click",e=>{if(e.target===lb)closeLb()});

  // ── Typing indicator (IG style) ───────────────────────────
  const typRow=el("div",{style:{display:"none",gap:"8px",alignItems:"flex-end",paddingLeft:"2px",padding:"4px 0"}},
    IGAvatar(char,28),
    el("div",{style:{
      background:C.s3, borderRadius:"18px 18px 18px 4px",
      padding:"12px 16px", display:"flex", gap:"5px", alignItems:"center",
    }},
      el("span",{class:"td1",style:{width:"7px",height:"7px",borderRadius:"50%",background:"#555",display:"inline-block"}}),
      el("span",{class:"td2",style:{width:"7px",height:"7px",borderRadius:"50%",background:"#555",display:"inline-block"}}),
      el("span",{class:"td3",style:{width:"7px",height:"7px",borderRadius:"50%",background:"#555",display:"inline-block"}})
    )
  );

  function setLoading(v,wt=""){
    if(destroyed)return;
    loading=v;typRow.style.display=v?"flex":"none";
    if(v){setStatus(wt||"escribiendo…",true);msgArea.appendChild(typRow);}
    else setStatus("Activo ahora",false);
    msgArea.appendChild(bref);bref.scrollIntoView({behavior:"smooth"});

  // ── Reaction picker ──────────────────────────────────────
  let reactionPickerFor=null;
  let reactionPickerEl=null;
  function closeReactionPicker(){
    if(reactionPickerEl){reactionPickerEl.remove();reactionPickerEl=null;}
    reactionPickerFor=null;
  }
  function openReactionPicker(msgId, anchorEl){
    closeReactionPicker();
    reactionPickerFor=msgId;
    const picker=el("div",{style:{
      position:"absolute", zIndex:"50",
      background:"#1c1c1c", border:`1px solid ${C.border}`,
      borderRadius:"24px", padding:"8px 10px",
      display:"flex", gap:"6px",
      boxShadow:"0 4px 20px rgba(0,0,0,.8)",
    }});
    for(const emoji of REACTIONS){
      const b=el("button",{style:{
        background:"none",border:"none",fontSize:"22px",cursor:"pointer",
        padding:"2px 4px",borderRadius:"50%",transition:"transform .1s",
      }},emoji);
      b.addEventListener("click",e=>{
        e.stopPropagation();
        const r={...reactions};
        if(r[msgId]===emoji) delete r[msgId];
        else r[msgId]=emoji;
        reactions=r;setReactions(r);
        closeReactionPicker();
        rebuildMsgs();
      });
      b.addEventListener("mouseenter",()=>b.style.transform="scale(1.3)");
      b.addEventListener("mouseleave",()=>b.style.transform="scale(1)");
      picker.appendChild(b);
    }
    reactionPickerEl=picker;
    // position relative to msgArea
    const rect=anchorEl.getBoundingClientRect();
    const areaRect=msgArea.getBoundingClientRect();
    picker.style.top=(rect.top-areaRect.top-50)+"px";
    picker.style.left=Math.max(4,rect.left-areaRect.left-20)+"px";
    picker.style.position="absolute";
    msgArea.style.position="relative";
    msgArea.appendChild(picker);
    setTimeout(()=>document.addEventListener("click",closeReactionPicker,{once:true}),10);

  // ── Voice message bubble (synthetic) ─────────────────────
  function makeVoiceBubble(durationSec, isUser){
    const bars=16;
    const waveWrap=el("div",{style:{
      display:"flex",alignItems:"center",gap:"3px",height:"28px",
    }});
    for(let i=0;i<bars;i++){
      const h=8+Math.floor(Math.random()*18);
      const b=el("div",{style:{
        width:"3px", height:h+"px", borderRadius:"2px",
        background: isUser?"rgba(255,255,255,.7)":"#555",
        transition:"background .2s",
      }});
      waveWrap.appendChild(b);
    }
    const dur=el("span",{style:{fontSize:"12px",color:isUser?"rgba(255,255,255,.7)":"#666",marginLeft:"6px",flexShrink:"0"}},
      durationSec<60?durationSec+"s":Math.floor(durationSec/60)+"m"+String(durationSec%60).padStart(2,"0")+"s");
    const playBtn=el("button",{style:{
      background:"none",border:"none",fontSize:"18px",cursor:"pointer",padding:"0 4px",flexShrink:"0",
      color:isUser?"#fff":"#999",
    }},"▶");
    let playing=false;
    playBtn.addEventListener("click",()=>{
      playing=!playing;
      playBtn.textContent=playing?"⏸":"▶";
      // Animate bars while "playing"
      if(playing){
        let i=0;
        const anim=setInterval(()=>{
          if(!playing){clearInterval(anim);return;}
          const bars2=waveWrap.querySelectorAll("div");
          bars2.forEach((b,bi)=>{b.style.background=bi===i%bars?"#a78bfa":(isUser?"rgba(255,255,255,.7)":"#555")});
          i++;
          if(i>bars*3){clearInterval(anim);playing=false;playBtn.textContent="▶";bars2.forEach(b=>b.style.background=isUser?"rgba(255,255,255,.7)":"#555");}
        },100);
      }
    });
    return el("div",{style:{display:"flex",alignItems:"center",gap:"6px",minWidth:"140px"}},playBtn,waveWrap,dur);
  }

  // ── Render a single bubble (Instagram DM style) ───────────
  function renderBubble(msg){
    const isUser=msg.role==="user";
    const c=msg.content;
    const isMedia=c?.type==="media"&&c.url;
    const isVoice=c?.type==="voice";
    const wasViewed=!!viewed[msg.id];
    const reaction=reactions[msg.id];

    const row=el("div",{class:"msg-in",style:{
      display:"flex",gap:"6px",
      alignItems:"flex-end",
      flexDirection:isUser?"row-reverse":"row",
      margin:"1px 0",
      position:"relative",
    }});

    // Avatar only for bot, only on last consecutive message
    if(!isUser) row.appendChild(IGAvatar(char,28));

    const inner=el("div",{style:{
      maxWidth:"72%",display:"flex",flexDirection:"column",
      gap:"2px",alignItems:isUser?"flex-end":"flex-start",
      position:"relative",
    }});

    // Date separator (first msg of day)
    // handled at rebuild level

    if(isMedia){
      if(c.viewMode==="once"&&wasViewed){
        inner.appendChild(el("div",{style:{
          background:C.s2,color:C.muted,borderRadius:"14px",
          padding:"9px 14px",fontSize:"13px",fontStyle:"italic",
        }},"👁 Foto vista — ya no disponible"));
      } else {
        const wrap=el("div",{style:{
          position:"relative",display:"inline-block",cursor:"pointer",
          borderRadius:"18px",overflow:"hidden",
          maxWidth:"210px",
          boxShadow:"0 2px 16px rgba(0,0,0,.6)",
        }});
        if(c.mediaType==="video")wrap.appendChild(el("video",{src:c.url,style:{width:"100%",display:"block"},controls:""}));
        else wrap.appendChild(el("img",{src:c.url,alt:"",style:{width:"100%",display:"block"}}));
        if(c.viewMode==="once")wrap.appendChild(el("div",{style:{position:"absolute",bottom:"6px",right:"8px",background:"rgba(0,0,0,.75)",borderRadius:"9px",padding:"2px 8px",fontSize:"11px",color:"#fff"}},"👁 1×"));
        wrap.addEventListener("click",()=>{
          if(c.viewMode==="once"&&!wasViewed)openLb(c,()=>{viewed={...viewed,[msg.id]:true};rebuildMsgs();});
          else openLb(c);
        });
        inner.appendChild(wrap);
      }
    }

    if(isVoice){
      const vcWrap=el("div",{style:{
        background:isUser?userColor:C.s3,
        borderRadius:isUser?"18px 18px 4px 18px":"18px 18px 18px 4px",
        padding:"10px 13px",
      }});
      vcWrap.appendChild(makeVoiceBubble(c.duration||3,isUser));
      inner.appendChild(vcWrap);
    }

    if(c?.text&&c.text.trim()){
      const isJealous = !isUser && !!c._jealousy;
      const isUserJealous = !isUser && !!c._userJealous;
      if(isJealous){
        // Small label above the bubble
        const jLabel=el("div",{style:{
          fontSize:"10px",fontWeight:"700",letterSpacing:".6px",
          color:"#22c55e",textTransform:"uppercase",
          marginBottom:"3px",paddingLeft:"2px",opacity:".85",
        }},"💚 celos");
        inner.appendChild(jLabel);
      }
      if(isUserJealous){
        const ujLabel=el("div",{style:{
          fontSize:"10px",fontWeight:"700",letterSpacing:".6px",
          color:"#f59e0b",textTransform:"uppercase",
          marginBottom:"3px",paddingLeft:"2px",opacity:".85",
        }},"😒 algo celoso/a");
        inner.appendChild(ujLabel);
      }
      const bubble=el("div",{style:{
        background:isUser?userColor: isJealous?"#122112":isUserJealous?"#211a0c":C.s3,
        color:C.text,
        borderRadius:isUser?"18px 18px 4px 18px":"18px 18px 18px 4px",
        padding:"10px 14px",
        fontSize:"15px",lineHeight:"1.52",
        wordBreak:"break-word",whiteSpace:"pre-wrap",
        maxWidth:"100%",
        boxShadow:isUser?"none": isJealous?"0 0 0 1.5px #22c55e66,0 1px 4px rgba(0,0,0,.4)":isUserJealous?"0 0 0 1.5px #f59e0b66,0 1px 4px rgba(0,0,0,.4)":"0 1px 4px rgba(0,0,0,.3)",
        cursor:"pointer",
      }},c.text);
      // Double-tap / long-press → reaction picker
      let tapTimer=null,taps=0;
      bubble.addEventListener("click",e=>{
        taps++;
        if(taps===1){tapTimer=setTimeout(()=>{taps=0;},300);}
        if(taps>=2){clearTimeout(tapTimer);taps=0;openReactionPicker(msg.id,bubble);}
      });
      inner.appendChild(bubble);
    }

    // Reaction badge
    if(reaction){
      const rb=el("div",{style:{
        fontSize:"16px",
        background:"#1c1c1c",border:`1px solid ${C.border}`,
        borderRadius:"20px",padding:"2px 6px",
        alignSelf:isUser?"flex-end":"flex-start",
        marginTop:"-4px",cursor:"pointer",
      }},reaction);
      rb.addEventListener("click",()=>{
        const r={...reactions};delete r[msg.id];reactions=r;setReactions(r);rebuildMsgs();
      });
      inner.appendChild(rb);
    }

    // Timestamp + read receipt
    if(msg.ts){
      const d=new Date(msg.ts);
      const hh=d.getHours().toString().padStart(2,"0"),mm=d.getMinutes().toString().padStart(2,"0");
      const readBy=getReadBy();
      const isRead=isUser&&readBy[msg.id];
      inner.appendChild(el("div",{style:{
        display:"flex",alignItems:"center",gap:"3px",
        justifyContent:isUser?"flex-end":"flex-start",
      }},
        el("span",{style:{fontSize:"10px",color:C.muted2}},hh+":"+mm),
        isUser ? el("span",{style:{fontSize:"11px",color:isRead?"#a78bfa":C.muted2}},isRead?"✓✓":"✓") : null
      ));
    }

    row.appendChild(inner);
    return row;
  }

  // ── Date separators ──────────────────────────────────────
  function dateSep(ts){
    const d=new Date(ts);
    const now=new Date();
    let label;
    if(d.toDateString()===now.toDateString()) label="Hoy";
    else if(d.toDateString()===new Date(now-86400000).toDateString()) label="Ayer";
    else label=d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear();
    return el("div",{style:{
      display:"flex",alignItems:"center",justifyContent:"center",
      margin:"8px 0 4px",
    }},
      el("span",{style:{
        fontSize:"11px",color:C.muted,
        background:C.s2,borderRadius:"10px",
        padding:"3px 10px",
      }},label)
    );
  }

  function rebuildMsgs(){
    if(destroyed)return;
    msgArea.innerHTML="";
    let lastDate="";
    for(const m of messages){
      if(m.ts){
        const d=new Date(m.ts).toDateString();
        if(d!==lastDate){msgArea.appendChild(dateSep(m.ts));lastDate=d;}
      }
      msgArea.appendChild(renderBubble(m));
    }
    if(loading)msgArea.appendChild(typRow);
    msgArea.appendChild(bref);
    setTimeout(()=>bref.scrollIntoView({behavior:"smooth"}),50);
  }

  // ── Mark messages as read ─────────────────────────────────
  function markRead(){
    const rb=getReadBy();
    let changed=false;
    for(const m of messages){
      if(m.role==="user"&&!rb[m.id]){rb[m.id]=true;changed=true;}
    }
    if(changed)setReadBy(rb);
  }

  // ── Send content (main engine) ────────────────────────────
  async function sendContent(userContent){
    if(loading||destroyed)return;
    resetSpontTimer();
    if(followUpTimer){clearTimeout(followUpTimer);followUpTimer=null;}
    if(userContent?.type==="text"){
      nudgeMoodFromText(char, userContent.text);
      applyRelationshipImpact(char, userContent.text, messages);
      checkUserMentionJealousy(char, userContent.text);
    }
    const uMsg={id:uid(),role:"user",content:userContent,ts:Date.now()};
    const newMsgs=[...messages,uMsg];
    saveMsgs(newMsgs);
    if(msgArea.lastChild===bref)msgArea.insertBefore(renderBubble(uMsg),bref);
    else msgArea.appendChild(renderBubble(uMsg));
    inputEl.value="";inputEl.style.height="auto";
    sendBtn.style.background=C.s3;
    setLoading(true,"visto ✓");

    // Mark user's messages as seen by bot after short delay
    setTimeout(()=>{
      if(destroyed)return;
      const rb=getReadBy();rb[uMsg.id]=true;setReadBy(rb);
      rebuildMsgs();
    },800+Math.random()*1200);

    try{
      await delay(350+Math.random()*300);
      if(destroyed)return;
      setStatus("escribiendo…",true);

      const pid=sChar.providerId,mid=sChar.modelId,apiKey=getKey(pid);
      const sentSet=getSentIndices(newMsgs);
      const ctxText=newMsgs.slice(-4).map(m=>m.content?.text||"").join(" ");
      const preMatch=scoredGalleryMatch(sChar.media||[],sentSet,ctxText);
      const preHint=preMatch!=null?`\n[Sugerencia del sistema: el archivo #${preMatch.idx} parece relevante para el contexto actual.]`:"";
      const system=buildSystem(sChar,sentSet,{isCF:isCloseFriend(char.id)})+preHint;
      const reply=await callAPI({providerId:pid,apiKey,modelId:mid,system,messages:newMsgs,maxTokens:900});
      if(destroyed)return;
      const{parts,picked,viewMode}=parseReply(reply,sChar.media||[]);

      let final=newMsgs;
      const wasUserJealousTurn = isUserJealousActive(char.id);
      for(let i=0;i<parts.length;i++){
        const partText=parts[i];
        const isLast=i===parts.length-1;
        await delay(Math.min(typingMs(partText),2600));
        if(destroyed)return;
        if(i>0) setLoading(true,"escribiendo…");

        const pickedIdx=(isLast&&picked)?(sChar.media||[]).indexOf(picked):-1;
        const ac=(isLast&&picked)
          ?{type:"media",mediaType:picked.type,url:picked.url,text:partText,viewMode,description:picked.description,galleryIdx:pickedIdx,_userJealous:i===0&&wasUserJealousTurn}
          :{type:"text",text:partText,_userJealous:i===0&&wasUserJealousTurn};
        const botMsg={id:uid(),role:"assistant",content:ac,ts:Date.now()};
        final=[...final,botMsg];
        messages=final;
        saveMsgs(final);
        if(isLast) setLoading(false);
        msgArea.appendChild(renderBubble(botMsg));
        msgArea.appendChild(bref);bref.scrollIntoView({behavior:"smooth"});

        if(!isLast) await delay(400+Math.random()*700);
      }

      resetSpontTimer();
      resetFollowUpTimer();
    }catch(e){
      if(destroyed)return;
      setLoading(false);
      const em={id:uid(),role:"assistant",content:{type:"text",text:"⚠️ "+e.message},ts:Date.now()};
      const errFinal=[...newMsgs,em];
      messages=errFinal;
      saveMsgs(errFinal);
      msgArea.appendChild(renderBubble(em));msgArea.appendChild(bref);bref.scrollIntoView({behavior:"smooth"});
    }
  }

  // ── Opener ───────────────────────────────────────────────
  if(!messages.length){
    setTimeout(async()=>{
      if(destroyed)return;
      setLoading(true,"escribiendo…");
      try{
        let text=sChar.opener;
        if(!text){
          const r=await callAPI({
            providerId:sPid,apiKey:getKey(sPid),modelId:sMid,
            system:buildSystem(sChar,new Set()),
            messages:[{id:"_init",role:"user",content:{type:"text",text:"[Sistema: saluda de forma natural y breve como "+sChar.name+". Máximo 1-2 frases cortas.]"}}],
            maxTokens:120,
          });
          if(destroyed)return;
          text=parseReply(r,[]).text;
        }
        await delay(600+Math.random()*400);
        if(destroyed)return;
        const m={id:uid(),role:"assistant",content:{type:"text",text},ts:Date.now()};
        saveMsgs([m]);setLoading(false);
        msgArea.appendChild(renderBubble(m));msgArea.appendChild(bref);bref.scrollIntoView({behavior:"smooth"});
        resetSpontTimer();
        resetFollowUpTimer();
      }catch(e){
        if(destroyed)return;
        const m={id:uid(),role:"assistant",content:{type:"text",text:"Hola 👋"},ts:Date.now()};
        saveMsgs([m]);setLoading(false);
        msgArea.appendChild(renderBubble(m));msgArea.appendChild(bref);bref.scrollIntoView({behavior:"smooth"});
        resetSpontTimer();
        resetFollowUpTimer();
      }
    },350);
  }else{
    rebuildMsgs();
    markRead();
    resetSpontTimer();
    resetFollowUpTimer();
  }

  // ── Input area ───────────────────────────────────────────
  const fileRef=el("input",{type:"file",accept:"image/*,video/*",style:{display:"none"}});
  fileRef.addEventListener("change",async e=>{
    const f=e.target.files[0];if(!f)return;
    const isVid=f.type.startsWith("video/");
    let url=await readFile(f);
    if(!isVid)url=await resizeImg(url);
    e.target.value="";
    sendContent({type:"media",mediaType:isVid?"video":"image",url,text:"",description:isVid?"video adjunto":"imagen adjunta"});
  });

  const inputEl=el("textarea",{placeholder:"Mensaje…",rows:"1",style:{
    flex:"1",background:C.s2,
    border:`1px solid ${C.border}`,
    borderRadius:"22px",padding:"10px 15px",
    color:C.text,fontSize:"15px",
    outline:"none",lineHeight:"1.48",
    overflow:"hidden",maxHeight:"120px",minWidth:"0",
  }});
  inputEl.addEventListener("input",()=>{
    inputEl.style.height="auto";
    inputEl.style.height=Math.min(inputEl.scrollHeight,120)+"px";
    const hasText=inputEl.value.trim()&&!loading;
    sendBtn.style.background=hasText?userColor:C.s3;
    sendBtn.style.backgroundImage=hasText&&igMode?IG_GRAD:"none";
  });
  inputEl.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doSend();}});

  // IG send button with gradient
  const sendBtn=el("button",{style:{
    background:C.s3,border:"none",borderRadius:"50%",
    width:"42px",height:"42px",flexShrink:"0",
    transition:"background .15s",
    display:"flex",alignItems:"center",justifyContent:"center",
  }});
  sendBtn.innerHTML=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;
  function doSend(){const t=inputEl.value.trim();if(t&&!loading)sendContent({type:"text",text:t});}
  sendBtn.addEventListener("click",doSend);

  // Attachment + emoji-like buttons
  const attBtn=el("button",{style:{
    background:C.s2,border:"none",borderRadius:"50%",
    width:"42px",height:"42px",flexShrink:"0",fontSize:"19px",
    display:"flex",alignItems:"center",justifyContent:"center",
    transition:"background .12s",
  }},"📎");
  attBtn.addEventListener("click",()=>fileRef.click());
  attBtn.addEventListener("mouseenter",()=>attBtn.style.background=C.s3);
  attBtn.addEventListener("mouseleave",()=>attBtn.style.background=C.s2);

  // Heart quick reaction button
  const heartBtn=el("button",{style:{
    background:"none",border:"none",fontSize:"24px",
    padding:"0 2px",flexShrink:"0",cursor:"pointer",
    transition:"transform .1s",color:"#ed4956",
  }},"♥");
  heartBtn.addEventListener("click",()=>{
    heartBtn.style.transform="scale(1.4)";
    setTimeout(()=>heartBtn.style.transform="scale(1)",200);
    sendContent({type:"text",text:"❤️"});
  });

  // ── Model picker ─────────────────────────────────────────
  const mpPanel=el("div",{style:{display:"none",position:"absolute",top:"62px",left:"12px",right:"12px",background:"#111",borderRadius:"13px",overflow:"hidden",zIndex:"31",boxShadow:"0 8px 32px rgba(0,0,0,.9)",maxHeight:"65vh",overflowY:"auto",border:`1px solid ${C.border}`}});
  const mbEl=el("div",{style:{cursor:"pointer",userSelect:"none"}});
  function refreshMBadge(){
    mbEl.innerHTML="";
    const p=PROVIDERS[sPid];const m=p.models.find(x=>x.id===sMid);
    mbEl.appendChild(el("div",{style:{background:p.color+"22",color:p.color,border:`1px solid ${p.color}44`,borderRadius:"8px",padding:"2px 8px",fontSize:"10px",fontWeight:"600"}},p.emoji+" "+(m?.label||sMid.split("-").slice(0,2).join(" "))));
  }
  refreshMBadge();
  mbEl.addEventListener("click",e=>{
    e.stopPropagation();mpOpen=!mpOpen;
    if(mpOpen){buildMPicker();mpPanel.style.display="block";}
    else mpPanel.style.display="none";
  });

  function buildMPicker(){
    mpPanel.innerHTML="";
    mpPanel.appendChild(el("div",{style:{padding:"11px 15px 8px",borderBottom:`1px solid ${C.border}`}},
      el("div",{style:{fontWeight:"700",fontSize:"13px",color:C.text}},"Cambiar modelo"),
      el("div",{style:{fontSize:"10px",color:C.muted,marginTop:"2px"}},"Afecta solo esta sesión")
    ));
    for(const[pid,p]of Object.entries(PROVIDERS)){
      const ak=getKey(pid);
      mpPanel.appendChild(el("div",{style:{padding:"7px 15px 3px",fontSize:"10px",color:p.color,fontWeight:"700",letterSpacing:".5px"}},p.emoji+" "+p.name.toUpperCase()));
      if(!ak&&pid!=="claude"){mpPanel.appendChild(el("div",{style:{padding:"4px 15px 8px",fontSize:"11px",color:C.muted}},"Sin API key — agrega en ⚙️"));continue;}
      for(const m of p.models){
        const isAct=sPid===pid&&sMid===m.id;
        const r=el("button",{style:{display:"flex",alignItems:"center",gap:"10px",width:"100%",padding:"9px 15px",background:isAct?p.color+"18":"transparent",border:"none",cursor:"pointer",transition:"background .1s",textAlign:"left"}},
          el("div",{style:{flex:"1"}},el("div",{style:{fontWeight:"600",fontSize:"13px",color:C.text}},m.label),el("div",{style:{fontSize:"11px",color:C.muted}},m.desc)),
          badge(m.badge,p.color),
          isAct?el("span",{style:{color:p.color,fontSize:"14px"}},"✓"):el("span")
        );
        r.addEventListener("mouseenter",()=>r.style.background=p.color+"18");
        r.addEventListener("mouseleave",()=>r.style.background=isAct?p.color+"18":"transparent");
        r.addEventListener("click",()=>{sPid=pid;sMid=m.id;sChar={...sChar,providerId:pid,modelId:m.id};mpPanel.style.display="none";mpOpen=false;refreshMBadge();});
        mpPanel.appendChild(r);
      }
    }
  }

  // ── Context menu ─────────────────────────────────────────
  const menuPanel=el("div",{style:{display:"none",position:"absolute",top:"62px",right:"12px",background:"#111",borderRadius:"12px",overflow:"hidden",zIndex:"30",minWidth:"190px",boxShadow:"0 8px 32px rgba(0,0,0,.9)",border:`1px solid ${C.border}`}});
  function mItem(t,col,cb){
    const b=el("button",{style:{display:"block",width:"100%",padding:"13px 17px",background:"none",border:"none",color:col||C.text,textAlign:"left",fontSize:"15px",fontFamily:"inherit",transition:"background .1s"}},t);
    b.addEventListener("mouseenter",()=>b.style.background=C.s3);b.addEventListener("mouseleave",()=>b.style.background="none");
    b.addEventListener("click",()=>{menuPanel.style.display="none";menuOpen=false;cb()});return b;
  }
  menuPanel.appendChild(mItem("👤 Ver perfil",null,()=>{nav("profile",char)}));
  menuPanel.appendChild(mItem("✏️ Editar personaje",null,()=>{state.editing=char;nav("form")}));
  menuPanel.appendChild(mItem("💞 Ver relación",null,()=>{nav("relpanel",char)}));
  menuPanel.appendChild(mItem("🔄 Reiniciar chat",C.amber,()=>{
    // Borra el historial y vuelve a abrir el chat desde cero.
    // Pasar por nav() asegura que runTeardown() limpie timers,
    // listeners de document y closures de ESTA instancia antes
    // de crear una nueva — evita que queden "chats fantasma".
    saveChats({...state.chats,[char.id]:[]});
    nav("chat",char);
  }));
  menuPanel.appendChild(mItem("❌ Eliminar personaje",C.red,()=>{
    saveChars(state.chars.filter(c=>c.id!==char.id));
    const nc={...state.chats};delete nc[char.id];saveChats(nc);
    setNotes(getNotes().filter(n=>n.charId!==char.id));
    const nm={...getNotesMeta()};delete nm[char.id];setNotesMeta(nm);
    nav("home");
  }));

  const moreBtn=el("button",{style:{background:"none",border:"none",color:C.muted,fontSize:"22px",padding:"0 4px",fontFamily:"inherit"}},"⋮");
  moreBtn.addEventListener("click",e=>{e.stopPropagation();menuOpen=!menuOpen;menuPanel.style.display=menuOpen?"block":"none";if(menuOpen){mpOpen=false;mpPanel.style.display="none";}});

  const docClickHandler=(e)=>{
    if(menuOpen&&!menuPanel.contains(e.target)&&e.target!==moreBtn){menuOpen=false;menuPanel.style.display="none";}
    if(mpOpen&&!mpPanel.contains(e.target)&&!mbEl.contains(e.target)){mpOpen=false;mpPanel.style.display="none";}
  };
  document.addEventListener("click",docClickHandler);

  // ── IG-style header ───────────────────────────────────────
  const hdr=el("div",{style:{
    display:"flex",alignItems:"center",gap:"10px",padding:"10px 14px",
    borderBottom:`1px solid ${C.border}`,background:C.bg,
    flexShrink:"0",position:"relative",zIndex:"10",
  }},
    el("button",{
      style:{background:"none",border:"none",color:C.text,fontSize:"22px",padding:"0 4px",cursor:"pointer"},
      onClick:()=>nav("home")
    },"←"),
    (()=>{
      const charStories = getCharStories(char.id);
      const seenSt = getSeenStories();
      const hasUnseen = charStories.some(s=>!seenSt[s.id]);
      if(charStories.length){
        const ringWrap = document.createElement("div");
        const isCF = charStories.some(s=>s.isCF);
        ringWrap.style.cssText = `border-radius:50%;padding:2.5px;cursor:pointer;flex-shrink:0;width:46px;height:46px;display:flex;align-items:center;justify-content:center;background:${hasUnseen?(isCF?"linear-gradient(135deg,#22c55e,#16a34a)":"linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045)"):"#333"}`;
        const avInner = document.createElement("div");
        avInner.style.cssText = "border-radius:50%;border:2px solid #000;overflow:hidden;width:38px;height:38px";
        const avEl = IGAvatar(char,34,false);
        avInner.appendChild(avEl);
        ringWrap.appendChild(avInner);
        ringWrap.addEventListener("click",()=>openStoryViewer([char],0));
        return ringWrap;
      }
      return (()=>{const av=IGAvatar(char,38,true);av.style.cursor="pointer";av.addEventListener("click",()=>nav("profile",char));return av;})();
    })(),
    el("div",{style:{flex:"1",minWidth:"0",cursor:"pointer"},
      onClick:()=>nav("profile",char)},
      el("div",{style:{fontWeight:"600",fontSize:"15px",color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"flex",alignItems:"center",gap:"6px"}},
        char.name,
        isCloseFriend(char.id) ? (()=>{const b=document.createElement("span");b.className="cf-badge";b.textContent="★ CF";return b;})() : null
      ),
      el("div",{style:{display:"flex",alignItems:"center",gap:"5px",marginTop:"1px"}},
        sdot,slbl,
        el("span",{style:{color:C.muted,fontSize:"11px",margin:"0 4px"}},"|"),
        mbEl
      )
    ),
    // Video call icon (decorative, IG style)
    el("button",{style:{background:"none",border:"none",fontSize:"22px",color:C.muted,cursor:"default",padding:"0 4px"}},moreBtn.style.color="",
    ),
    moreBtn,menuPanel,mpPanel
  );

  const inputBar=el("div",{style:{
    padding:"8px 10px",background:C.bg,
    borderTop:`1px solid ${C.border}`,
    display:"flex",gap:"6px",alignItems:"flex-end",
    flexShrink:"0",
  }},
    fileRef,attBtn,inputEl,heartBtn,sendBtn
  );

  // ── Teardown ───────────────────────────────────────────────
  // Se ejecuta automáticamente cuando render() pasa a otra
  // pantalla (incluyendo re-abrir este mismo chat tras
  // "Reiniciar chat"). Marca destroyed=true para que cualquier
  // timer/promesa pendiente de ESTA instancia se vuelva inerte,
  // quita el listener global de document y limpia el lightbox.
  registerTeardown(()=>{
    destroyed=true;
    if(spontTimer)clearTimeout(spontTimer);
    if(followUpTimer)clearTimeout(followUpTimer);
    document.removeEventListener("click",docClickHandler);
    closeReactionPicker();
    lbRoot.innerHTML="";
    if(window.__activeChatId===char.id){
      window.__activeChatId=null;
      window.__activeChatAppend=null;
    }
  });

  return Wrap(hdr,msgArea,inputBar);
}

/* ─── BOOT ────────────────────────────────────────────────── */
render();

</script>
</body>
</html>
