function resizeImg(dataUrl,maxPx=1024){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const s=Math.min(1,maxPx/Math.max(img.width,img.height));
      const w=Math.round(img.width*s),h=Math.round(img.height*s);
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      resolve(c.toDataURL("image/jpeg",.82));
    };
    img.onerror=()=>resolve(dataUrl);img.src=dataUrl;
  });
}

/* ─── LOCAL PROXY DETECTION ───────────────────────────────
   Orden de prioridad:
   1. APK nativo (Capacitor) → fetch directo, sin CORS
   2. Proxy local HTTP  http://127.0.0.1:3131  (node proxy.js)
   3. Proxy local HTTPS https://127.0.0.1:3132  (para Grok desde HTTPS)
   4. Proveedor con corsOk:true → fetch directo (Groq, Claude)
   5. Proxies públicos de emergencia                           */

const LOCAL_HTTP  = "http://127.0.0.1:3131";
const LOCAL_HTTPS = "https://127.0.0.1:3132";
const PUBLIC_PROXIES = [
  "https://corsproxy.io/?",
  "https://api.allorigins.win/raw?url=",
];

// Estado del proxy local — se comprueba al iniciar y cada 15s
let _localProxy = null; // null=sin comprobar, false=inactivo, "http"|"https"=activo

async function detectLocalProxy(){
  // Intenta HTTP primero (más simple, sin advertencia de certificado)
  for(const [mode,base] of [["http",LOCAL_HTTP],["https",LOCAL_HTTPS]]){
    try{
      const r=await fetch(base+"/health",{signal:AbortSignal.timeout(1500)});
      const d=await r.json().catch(()=>({}));
      if(d.ok){_localProxy=mode;return mode;}
    }catch{}
  }
  _localProxy=false;
  return false;
}

// Arranca la detección en background
detectLocalProxy().then(m=>{
  if(m)console.log("[proxy] Local proxy activo →",m==="http"?LOCAL_HTTP:LOCAL_HTTPS);
  else console.log("[proxy] Sin proxy local — usando CORS directo o proxies públicos");
});
setInterval(()=>detectLocalProxy(),15000);

/* Envía una llamada de API usando el mejor método disponible */
async function smartFetch(targetUrl, options){
  // 1. APK nativo — sin CORS, directo
  if(IS_NATIVE) return fetch(targetUrl, options);

  // 2. Proxy local activo — extraemos el proveedor de la URL
  if(_localProxy){
    const providerKey = Object.entries({
      claude:"api.anthropic.com", groq:"api.groq.com",
      grok:"api.x.ai", openai:"api.openai.com",
      gemini:"generativelanguage.googleapis.com", mistral:"api.mistral.ai",
    }).find(([,host])=>targetUrl.includes(host))?.[0];

    if(providerKey){
      const base = _localProxy==="https" ? LOCAL_HTTPS : LOCAL_HTTP;
      try{
        const r=await fetch(`${base}/proxy/${providerKey}`,{...options,signal:AbortSignal.timeout(30000)});
        if(r.status!==502) return r; // 502 = error del proxy mismo
      }catch(e){
        console.warn("[proxy] Local proxy falló, intentando directo:",e.message);
        _localProxy=false; // marcar como caído
      }
    }
  }

  // 3. Intento directo (funciona para Groq, Claude, y cualquier CORS-ok)
  try{
    const r=await fetch(targetUrl,{...options,signal:AbortSignal.timeout(10000)});
    if(r.status!==0) return r;
  }catch(e){
    if(!String(e.message+e).match(/cors|network|failed|blocked/i)) throw e;
  }

  // 4. Proxies públicos de emergencia
  let lastErr;
  for(const proxy of PUBLIC_PROXIES){
    try{
      const r=await fetch(proxy+encodeURIComponent(targetUrl),{...options,signal:AbortSignal.timeout(15000)});
      if(r.ok||r.status<500) return r;
    }catch(e){lastErr=e;}
  }
  throw lastErr||new Error("No se pudo conectar. Ejecuta node proxy.js para usar todos los proveedores sin errores.");
}

// Alias para compatibilidad con código existente

async function callAPI({providerId,apiKey,modelId,system,messages,maxTokens=900}){
  const p=PROVIDERS[providerId];
  if(!p)throw new Error("Proveedor desconocido: "+providerId);

  // Key validation — Claude works without key (via proxy), others need it
  if(!apiKey&&providerId!=="claude"){
    throw new Error(`Necesitas una API key de ${p.name}.\nVe a ⚙️ → Modelos y pega tu key.\n${p.keyHint}`);
  }

  if(p.compat==="claude"){
    /* ── Anthropic Claude ── */
    const headers={
      "Content-Type":"application/json",
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
    };
    if(apiKey)headers["x-api-key"]=apiKey;
    const ctxMsgs=buildContextMsgs(messages,"claude");
    const body={model:modelId,max_tokens:maxTokens,system,messages:ctxMsgs};
    const res=await fetch(p.url,{method:"POST",headers,body:JSON.stringify(body)});
    const d=await res.json();
    if(!res.ok)throw new Error(d?.error?.message||"Error "+res.status);
    const t=d.content?.find(b=>b.type==="text")?.text;
    if(!t)throw new Error("Respuesta vacía.");
    return t.trim();
  }else{
    /* ── OpenAI-compat (Groq, OpenAI, Grok, Gemini, Mistral) ── */
    const headers={"Content-Type":"application/json","Authorization":"Bearer "+apiKey};
    const ctxMsgs=buildContextMsgs(messages,"openai");
    const body={
      model:modelId,
      max_tokens:maxTokens,
      messages:[
        ...(system?[{role:"system",content:system}]:[]),
        ...ctxMsgs,
      ],
    };
    const res=await smartFetch(p.url,{method:"POST",headers,body:JSON.stringify(body)});
    const d=await res.json();
    if(!res.ok)throw new Error(d?.error?.message||"Error "+res.status);
    const t=d.choices?.[0]?.message?.content;
    if(!t)throw new Error("Respuesta vacía.");
    return typeof t==="string"?t.trim():t;
  }
}

/* ─── AI LOGIC ─────────────────────────────────────────────
 *
 *  ARCHITECTURE:
 *  1. Gallery index  — compact text-only catalog sent in EVERY system prompt
 *  2. Smart selector — JS picks the best candidate BEFORE calling the API;
 *                      the API only gets the candidate index, not base64 URLs
 *  3. Context window — only the last user image is sent as base64;
 *                      all prior images become "[img: description]" text
 *  4. Live personality — spontaneous messages, proactive image sends,
 *                        text-only replies most of the time
 * ────────────────────────────────────────────────────────── */

/* ── Gallery catalog builder (no base64, pure text) ── */
function buildGalleryCatalog(media, sentSet){
  if(!media||!media.length) return "(galería vacía)";
  return media.map((m,i)=>{
    if(sentSet&&sentSet.has(i)) return null;
    const tags = m.tags ? `[${m.tags}]` : "";
    const desc = m.description||"sin descripción";
    return `  #${i} | ${m.type} | ${desc}${tags?" "+tags:""}`;
  }).filter(Boolean).join("\n") || "(todos los archivos ya enviados)";
}

/* ── JS-side image scorer — picks best match for current context ──
 * Returns {idx, score} or null if no good match.
 * Avoids sending the gallery decision to the API entirely when possible.
 */
function scoredGalleryMatch(media, sentSet, contextText){
  if(!media||!media.length) return null;
  const ctx = (contextText||"").toLowerCase();
  const words = ctx.split(/\W+/).filter(w=>w.length>2);

  let best = null;
  for(let i=0;i<media.length;i++){
    if(sentSet&&sentSet.has(i)) continue;
    const m = media[i];
    const haystack = ((m.description||"")+" "+(m.tags||"")).toLowerCase();
    let score = 0;
    for(const w of words){
      if(haystack.includes(w)) score += 2;
    }
    // Bonus for exact tag matches
    const tags = (m.tags||"").split(",").map(t=>t.trim().toLowerCase());
    for(const t of tags){
      if(t&&ctx.includes(t)) score += 3;
    }
    if(score > 0 && (!best || score > best.score)){
      best = {idx:i, score};
    }
  }
  return best && best.score >= 2 ? best : null;
}

/* ── Parse AI reply — extract SEND markers, multi-message parts and clean text ── */
function parseReply(text, gallery){
  // Accept [SEND:N], [SEND: N], [SEND: #N], [SEND:#N] and common AI mistakes
  let sm = text.match(/\[SEND\s*:\s*#?\s*(\d+)\]/i);
  if(!sm) sm = text.match(/\[(?:photo|foto|image|img|archivo|file|pic|media)\s*[:#]?\s*#?\s*(\d+)\]/i);
  // Also catch bare format like "SEND: #0" outside brackets (AI sometimes omits brackets)
  if(!sm) sm = text.match(/SEND\s*:\s*#?\s*(\d+)/i);

  const isOnce = /\[ONCE\]/i.test(text);
  const isMulti = /\[MULTI\]/i.test(text);

  const clean = text
    .replace(/\[SEND\s*:\s*#?\s*\d+\]/gi,"")
    .replace(/\[(?:photo|foto|image|img|archivo|file|pic|media)\s*[:#]?\s*#?\s*\d+\]/gi,"")
    .replace(/SEND\s*:\s*#?\s*\d+/gi,"")
    .replace(/\[ONCE\]/gi,"")
    .replace(/\[MULTI\]/gi,"")
    .trim();

  const idx = sm ? parseInt(sm[1]) : -1;
  const picked = (idx>=0 && idx<(gallery||[]).length) ? gallery[idx] : null;

  // Split into multiple short bubbles using the ||| burst separator.
  let parts = clean.split(/\s*\|\|\|\s*/g)
    .map(p=>p.replace(/\s{2,}/g," ").trim())
    .filter(Boolean);
  if(!parts.length) parts = [""];

  const joined = parts.join(" ").replace(/\s{2,}/g," ").trim();
  return { text: joined, parts, picked, viewMode: isOnce?"once":isMulti?"multiple":"permanent" };
}

/* ── Build context window for API calls ──
 * Only the LAST user-sent image is embedded as base64.
 * All prior images become compact text references.
 * Gallery images (bot-sent) are NEVER base64-embedded — they stay as text.
 */
function buildContextMsgs(msgs, format){
  // Find last user image index
  let lastUserImgIdx = -1;
  for(let i=msgs.length-1;i>=0;i--){
    if(msgs[i].role==="user" && msgs[i].content?.type==="media" && msgs[i].content?.mediaType==="image"){
      lastUserImgIdx = i; break;
    }
  }

  if(format==="claude"){
    const out=[];
    for(let i=0;i<msgs.length;i++){
      const m=msgs[i]; const c=m.content;
      let contentArr;
      if(c?.type==="text"){
        contentArr=[{type:"text",text:c.text||""}];
      }else if(c?.type==="media"&&c.url){
        if(c.mediaType==="video"){
          contentArr=[{type:"text",text:m.role==="user"?"[video: "+(c.description||"clip")+"]":"[enviaste un video]"}];
        }else if(m.role==="user"&&i===lastUserImgIdx){
          const p=parseDataUrl(c.url);
          contentArr = p
            ? [{type:"image",source:{type:"base64",media_type:p.mediaType,data:p.data}},{type:"text",text:c.description||"imagen adjunta"}]
            : [{type:"text",text:c.description||"[imagen adjunta]"}];
        }else{
          // All other images (past user images + bot gallery images) → text only
          const fallbackText = m.role==="user"
            ? "[foto: "+(c.description||"imagen")+"]"
            : (c.text&&c.text.trim() ? c.text : "[compartí una imagen"+(c.description?": "+c.description:"")+"]");
          contentArr=[{type:"text",text:fallbackText}];
        }
      }else{ contentArr=[{type:"text",text:""}]; }
      if(out.length&&out[out.length-1].role===m.role){ out[out.length-1].content.push(...contentArr); continue; }
      out.push({role:m.role,content:contentArr});
    }
    return out.filter(m=>m.content.some(b=>b.type!=="text"||(b.text&&b.text.trim())));
  }else{
    // OpenAI-compat
    const out=[];
    for(let i=0;i<msgs.length;i++){
      const m=msgs[i]; const c=m.content;
      let content;
      if(c?.type==="text"){
        content=c.text||"";
      }else if(c?.type==="media"&&c.url){
        if(c.mediaType==="video"){
          content=m.role==="user"?"[video: "+(c.description||"clip")+"]":"[enviaste un video]";
        }else if(m.role==="user"&&i===lastUserImgIdx){
          const p=parseDataUrl(c.url);
          content = p
            ? [{type:"image_url",image_url:{url:c.url}},{type:"text",text:c.description||"imagen adjunta"}]
            : c.description||"[imagen adjunta]";
        }else{
          content=m.role==="user"
            ? "[foto: "+(c.description||"imagen")+"]"
            : (c.text&&c.text.trim() ? c.text : "[compartí una imagen"+(c.description?": "+c.description:"")+"]");
        }
      }else{ content=""; }
      if(!content&&content!==0) continue;
      if(out.length&&out[out.length-1].role===m.role){
        const prev=out[out.length-1];
        if(typeof prev.content==="string"&&typeof content==="string"){prev.content+="\n"+content;continue;}
      }
      out.push({role:m.role,content});
    }
    return out.filter(m=>m.content||m.content===0);
  }
}

/* ── Typing delay simulation ── */
function typingMs(text){
  const w=(text||"").split(" ").length;
  return Math.min(Math.max((w/220)*60000,500),3000);
}

/* ── Collect sent gallery indices from message history ── */
function getSentIndices(messages){
  const s=new Set();
  for(const m of messages){
    if(m.role==="assistant"&&m.content?.type==="media"&&m.content?.galleryIdx!=null){
      s.add(m.content.galleryIdx);
    }
  }
  return s;
}

/* ─── SCREEN TEARDOWN ─────────────────────────────────────────
 * Cada pantalla puede registrar una función de limpieza via
 * registerTeardown(fn). Se ejecuta automáticamente justo antes
 * de que render() destruya el DOM actual, evitando que queden
 * timers, listeners de document, o closures "zombie" de la
 * pantalla anterior escribiendo sobre el chat nuevo.
 * ──────────────────────────────────────────────────────────── */
let _currentTeardown=null;
function registerTeardown(fn){_currentTeardown=fn}
function runTeardown(){
  if(_currentTeardown){
    try{_currentTeardown();}catch{}
    _currentTeardown=null;
  }
}

/* ─── STORIES SYSTEM ──────────────────────────────────────── */
// Story = { id, charId, mediaIdx, mediaUrl, mediaType, caption, ts, isCF }
// charStoryState[charId] = { lastPosted:ts, nextPost:ts, closeFriendsTrust:0-100 }

function getStories(){return Store.get("stories")||[]}
function setStories(v){Store.set("stories",v)}
function getSeenStories(){return Store.get("seenStories")||{}}
function setSeenStories(v){Store.set("seenStories",v)}
function getStoryMeta(){return Store.get("storyMeta")||{}}
function setStoryMeta(v){Store.set("storyMeta",v)}
function getCFStatus(){return Store.get("cfStatus")||{}}
function setCFStatus(v){Store.set("cfStatus",v)}

const STORY_EXPIRE_MS = 24*60*60*1000; // 24h
// How many messages needed to unlock close friends (based on personality/trust)
const CF_MSG_THRESHOLD = 8;

/* Compute trust level for a character based on chat history */
function computeTrust(charId){
  const msgs = state.chats[charId]||[];
  // Count user messages as engagement
  const userMsgs = msgs.filter(m=>m.role==="user").length;
  const base = Math.min(100, Math.round(userMsgs * 8));
  const adjDelta = ((getTrustAdjust()||{})[charId]||{delta:0}).delta||0;
  return Math.max(0, Math.min(100, base + adjDelta));
}

/* Check if user is close friend of a character */
function isCloseFriend(charId){
  const cf = getCFStatus();
  return !!cf[charId];
}

/* Update close friends status based on trust */
function updateCFStatus(){
  const cf = getCFStatus();
  let changed = false;
  for(const c of state.chars){
    const trust = computeTrust(c.id);
    const wasCF = !!cf[c.id];
    const shouldBeCF = trust >= CF_MSG_THRESHOLD * 8; // ~8 exchanges
    if(shouldBeCF && !wasCF){ cf[c.id]=true; changed=true; }
  }
  if(changed) setCFStatus(cf);
}

/* Get active (non-expired) stories */
function getActiveStories(){
  const now = Date.now();
  const all = getStories();
  // Expire old
  const active = all.filter(s=>now - s.ts < STORY_EXPIRE_MS);
  if(active.length !== all.length) setStories(active);
  return active;
}

/* Get stories for a character (normal + CF if applicable) */
function getCharStories(charId){
  const active = getActiveStories();
  const isCF = isCloseFriend(charId);
  return active.filter(s=>s.charId===charId && (!s.isCF || isCF));
}

/* Check if a character should post a new story */
function shouldPostStory(char){
  const media = char.media||[];
  if(!media.length) return false;
  const meta = getStoryMeta();
  const m = meta[char.id]||{};
  const now = Date.now();
  // First story: post after ~2 min of app use, then every 2-6 hours randomly
  if(!m.lastPosted) return (now - (m.firstSeen||now)) > 2*60*1000;
  const interval = (2 + Math.random()*4) * 60*60*1000; // 2-6h
  return (now - m.lastPosted) > interval;
}

/* Post a new story for a character */
function postStory(char){
  const media = char.media||[];
  if(!media.length) return;
  const cf = isCloseFriend(char.id);
  const isCF_story = cf && Math.random() < 0.4; // 40% chance CF story if user is CF

  // Pick a random media item with preference for tags matching "story","selfie","casual","playa" etc.
  const storyTags = ["selfie","casual","playa","gym","exterior","cara","foto","íntima","provocativa"];
  const cfTags = ["íntima","provocativa","cara","selfie"];
  const pool = isCF_story
    ? media.filter((_,i)=>{ const t=(media[i].tags||"").toLowerCase(); return cfTags.some(tag=>t.includes(tag)); })
    : media.filter((_,i)=>{ const t=(media[i].tags||"").toLowerCase(); return storyTags.some(tag=>t.includes(tag)); });
  const pick = (pool.length ? pool : media)[Math.floor(Math.random()*(pool.length||media.length))];

  const story = {
    id: uid(),
    charId: char.id,
    mediaIdx: media.indexOf(pick),
    mediaUrl: pick.url,
    mediaType: pick.type||"image",
    caption: pick.description||"",
    ts: Date.now(),
    isCF: isCF_story,
  };

  const stories = getStories();
  stories.push(story);
  setStories(stories);

  // Update meta
  const meta = getStoryMeta();
  meta[char.id] = { ...( meta[char.id]||{}), lastPosted: Date.now(), firstSeen: (meta[char.id]||{}).firstSeen||Date.now() };
  setStoryMeta(meta);
}

/* Initialize story meta for a char if missing */
function initStoryMeta(char){
  const meta = getStoryMeta();
  if(!meta[char.id]){
    meta[char.id] = { firstSeen: Date.now() };
    setStoryMeta(meta);
  }
}

/* Tick: check all chars and post stories if due */
function tickStories(){
  updateCFStatus();
  for(const c of state.chars){
    initStoryMeta(c);
    if(shouldPostStory(c)) postStory(c);
  }
}

/* ─── NOTES SYSTEM (estilo Instagram Notes) ─────────────────
 * Note = { id, charId|"user", text, ts, replyToId? }
 * Cada personaje (y el usuario) solo tiene UNA nota visible a la vez:
 * la más reciente que no haya expirado. Expiran a las 2h, como en IG.
 * Los personajes generan notas cortas automáticamente cada 15-45min,
 * y pueden "responder" con su propia nota a la nota de otro personaje,
 * creando interacción visible entre ellos.
 * ──────────────────────────────────────────────────────────── */
const NOTE_EXPIRE_MS = 2*60*60*1000; // 2h, como Instagram Notes
const NOTE_MIN_MS = 15*60*1000;   // 15 min
const NOTE_MAX_MS = 45*60*1000;   // 45 min
const NOTE_MAX_LEN = 60;          // límite de caracteres tipo IG

function getNotes(){return Store.get("notes")||[]}
function setNotes(v){Store.set("notes",v)}
/* ═══════════════════════════════════════════════════════════
 *  ESTADO DE ÁNIMO DINÁMICO
 *  El mood de cada personaje ya no es solo lo que el creador
 *  escribe a mano: además fluctúa solo con el tiempo (drift
 *  aleatorio cada tanto) y reacciona a un análisis simple de
 *  sentimiento de lo que escribe el usuario (sin gastar tokens
 *  de IA — heurística local por palabras clave). */

const MOOD_POOL = [
  "tranquilo/a, de buena onda","con energía, hablador/a","cansado/a, con pocas ganas de escribir mucho",
  "de buen humor, con ganas de joder un poco","pensativo/a, algo callado/a","emocionado/a por algo que le pasó hoy",
  "un poco distraído/a, en su mundo","sensible, más a flor de piel que de costumbre",
  "estresado/a por cosas del día","relajado/a y cariñoso/a","con ganas de reírse de todo",
  "algo serio/a, sin mucha paciencia hoy",
];
const MOOD_DRIFT_MS = 25*60*1000; // ~25 min mínimo entre drifts naturales

function getMoodState(){ return Store.get("dynMood")||{}; }
function setMoodState(v){ Store.set("dynMood",v); }

/* Devuelve el mood EFECTIVO de un personaje: si hay un mood dinámico
 * vigente lo usa, si no cae al mood manual configurado por el creador. */
function getEffectiveMood(char){
  const st=getMoodState()[char.id];
  if(st && st.mood) return st.mood;
  return char.mood||"";
}

/* Drift aleatorio: con baja probabilidad y solo si pasó suficiente
 * tiempo desde el último cambio, el ánimo deriva solo a otro estado. */
function maybeDriftMood(char){
  const all=getMoodState();
  const st=all[char.id]||{mood:char.mood||"",ts:0};
  if(Date.now()-st.ts < MOOD_DRIFT_MS) return;
  if(Math.random() > 0.4) return; // 40% chance por tick elegible
  const pool=MOOD_POOL.filter(m=>m!==st.mood);
  const next=pool[Math.floor(Math.random()*pool.length)];
  all[char.id]={mood:next, ts:Date.now()};
  setMoodState(all);
}

/* Heurística local (sin IA) para detectar tono positivo/negativo
 * en lo último que escribió el usuario, y empujar el mood del bot
 * en consecuencia — como reaccionaría una persona real. */
const MOOD_POS_WORDS=["jaja","jeje","lol","genial","amor","gracias","feliz","contento","bien","increible","increíble","te quiero","te amo","besos","linda","lindo"];
const MOOD_NEG_WORDS=["triste","mal","odio","enojo","enojado","enojada","harto","harta","asco","feo","aburrido","aburrida","cansado","cansada","puta","mierda","idiota"];

function nudgeMoodFromText(char, userText){
  if(!userText) return;
  const t=userText.toLowerCase();
  let pos=0,neg=0;
  for(const w of MOOD_POS_WORDS) if(t.includes(w)) pos++;
  for(const w of MOOD_NEG_WORDS) if(t.includes(w)) neg++;
  if(pos===neg) return; // ambiguo, no tocar el ánimo
  const all=getMoodState();
  const st=all[char.id]||{mood:char.mood||"",ts:0};
  if(Math.random() > 0.55) return; // no reacciona SIEMPRE, sería poco natural
  const target = pos>neg
    ? ["de buen humor, con ganas de joder un poco","emocionado/a por algo que le pasó hoy","con ganas de reírse de todo","relajado/a y cariñoso/a"]
    : ["sensible, más a flor de piel que de costumbre","algo serio/a, sin mucha paciencia hoy","pensativo/a, algo callado/a","estresado/a por cosas del día"];
  const next=target[Math.floor(Math.random()*target.length)];
  all[char.id]={mood:next, ts:Date.now()};
  setMoodState(all);
}

/* ═══════════════════════════════════════════════════════════
 *  DECISIONES QUE AFECTAN LA RELACIÓN
 *  El trust ya no sube solo por cantidad de mensajes: ciertas
 *  conductas del usuario (groserías, ghosting, etc.) lo bajan
 *  o cambian el tono del bot por un tiempo — como en una
 *  relación real, no todo suma siempre. */

function getTrustAdjust(){ return Store.get("trustAdjust")||{}; }
function setTrustAdjust(v){ Store.set("trustAdjust",v); }

const RUDE_WORDS=["puta","mierda","idiota","estupido","estúpida","estupido","callate","cállate","odio","asco","inutil","inútil","basura","tonto","tonta"];
const GHOST_GAP_MS = 36*60*60*1000; // 36h sin escribir = ghosting

// Frases que sugieren que el usuario menciona a otra persona "en juego"
// (ex, alguien con quien coquetea, comparación) — dispara celos REALES
// del personaje, visibles para el usuario, no solo entre bots.
const JEALOUSY_TRIGGER_RE = /\b(mi ex|el ex|la ex|otro chico|otra chica|otro tipo|otra mina|otra persona que me gusta|alguien me gusta|me gusta otra|me gusta otro|estoy hablando con otr|saliendo con otr|tinder|conoc[íi] a alguien|conoc[íi] a un|conoc[íi] a una)\b/i;

function getUserJealousyState(){ return Store.get("userJealousy")||{}; }
function setUserJealousyState(v){ Store.set("userJealousy",v); }

/* Detecta si el último mensaje del usuario menciona a otra persona de
 * forma que podría generar celos reales del personaje, y si dispara,
 * activa un estado temporal (igual que "frío") que se refleja tanto
 * en el prompt como visualmente en el panel de relación. */
function checkUserMentionJealousy(char, userText){
  if(!userText || !JEALOUSY_TRIGGER_RE.test(userText)) return false;
  const st=getUserJealousyState();
  const flirt=char.flirt!=null?char.flirt:30;
  const autonomy=char.autonomy!=null?char.autonomy:50;
  // Personajes más independientes/menos coquetos reaccionan con menos frecuencia
  const chance = 0.85 - (autonomy/100)*0.25 + (flirt/100)*0.15;
  if(Math.random() > Math.min(0.9,chance)) return false;
  st[char.id] = { active:true, ts:Date.now(), until: Date.now() + (20+Math.random()*25)*60000 };
  setUserJealousyState(st);
  return true;
}

function isUserJealousActive(charId){
  const st=getUserJealousyState()[charId];
  return !!(st && st.active && Date.now() < st.until);
}

/* Penaliza/recompensa el trust según groserías detectadas y registra
 * si el bot debería estar "frío" un rato tras un trato feo. */
function applyRelationshipImpact(char, userText, prevMsgs){
  const adj=getTrustAdjust();
  const cur=adj[char.id]||{delta:0, coldUntil:0};
  const t=(userText||"").toLowerCase();
  const isRude = RUDE_WORDS.some(w=>t.includes(w));

  // Ghosting: si pasó mucho tiempo desde el último mensaje del usuario, resta confianza
  const lastTs = (prevMsgs||[]).length ? prevMsgs[prevMsgs.length-1].ts : null;
  const wasGhosted = lastTs && (Date.now()-lastTs) > GHOST_GAP_MS;

  if(isRude){
    cur.delta = Math.max(-40, cur.delta - 6);
    cur.coldUntil = Date.now() + (15+Math.random()*20)*60000; // 15-35 min frío
  }else if(wasGhosted){
    cur.delta = Math.max(-40, cur.delta - 3);
  }else{
    cur.delta = Math.min(20, cur.delta + 1); // recupera lento con trato normal
  }
  adj[char.id]=cur;
  setTrustAdjust(adj);
}

/* ¿Este personaje está "frío" con el usuario por algo reciente? */
function isColdWith(charId){
  const cur=(getTrustAdjust()[charId])||{coldUntil:0};
  return Date.now() < cur.coldUntil;
}

/* Hint de sistema que refleja el estado actual de la relación */
function relationshipHint(char){
  const adj=(getTrustAdjust()[char.id])||{delta:0,coldUntil:0};
  if(isUserJealousActive(char.id)){
    return "\n\n😒 El usuario acaba de mencionar a alguien más (un ex, alguien que le gusta, una comparación) — eso te generó algo real: celos, inseguridad, o fastidio, según tu personalidad. No lo dejes pasar como si nada; que se note en tu próxima respuesta (podés preguntar directo, hacer un comentario picante, ponerte más cortante, bromear con incomodidad, o lo que sea más fiel a quién eres), aunque después el tema se diluya naturalmente.";
  }
  if(Date.now() < adj.coldUntil){
    return "\n\n💢 Hace poco el usuario te trató mal o te hizo sentir mal — todavía estás algo dolido/a, a la defensiva o cortante con él/ella. No lo perdones de golpe ni actúes como si no hubiera pasado nada; que se note un poco en tu tono (más seca/o, menos cariño, quizás un comentario pasivo-agresivo) hasta que la conversación lo amerite.";
  }
  if(adj.delta <= -20){
    return "\n\n⚠️ La confianza con esta persona viene golpeada últimamente (groserías, faltas de atención repetidas). Sos más reservado/a, menos dispuesto/a a abrirte o ceder, hasta que se gane de nuevo tu confianza con el trato.";
  }
  return "";
}

function getNotesMeta(){return Store.get("notesMeta")||{}}
function setNotesMeta(v){Store.set("notesMeta",v)}

/* Notas activas (no expiradas) */
function getActiveNotes(){
  const now=Date.now();
  const all=getNotes();
  const active=all.filter(n=>now-n.ts<NOTE_EXPIRE_MS);
  if(active.length!==all.length)setNotes(active);
  return active;
}

/* Última nota activa de un personaje (o del usuario con charId="user") */
function getLatestNote(charId){
  const active=getActiveNotes().filter(n=>n.charId===charId);
  if(!active.length)return null;
  return active.reduce((a,b)=>a.ts>b.ts?a:b);
}

/* ¿Debe este personaje postear una nota nueva ahora? */
function shouldPostNote(char){
  const meta=getNotesMeta();
  const m=meta[char.id]||{};
  const now=Date.now();
  if(!m.lastPosted) return (now-(m.firstSeen||now)) > 60*1000; // primera nota ~1min después de creado
  const interval=NOTE_MIN_MS+Math.random()*(NOTE_MAX_MS-NOTE_MIN_MS);
  return (now-m.lastPosted) > interval;
}

function initNotesMeta(char){
  const meta=getNotesMeta();
  if(!meta[char.id]){
    meta[char.id]={firstSeen:Date.now()};
    setNotesMeta(meta);
  }
}

/* Limpia el cooldown de un personaje para forzar próxima nota más tarde */
function markNotePosted(charId){
  const meta=getNotesMeta();
  meta[charId]={...(meta[charId]||{}),lastPosted:Date.now()};
  setNotesMeta(meta);
}

/* Guarda una nota nueva (reemplaza la anterior del mismo autor para que solo haya una visible) */
function pushNote(charId,text,replyToId=null){
  const clean=(text||"").trim().slice(0,NOTE_MAX_LEN);
  if(!clean)return null;
  const note={id:uid(),charId,text:clean,ts:Date.now(),replyToId};
  const notes=getNotes();
  notes.push(note);
  setNotes(notes);
  markNotePosted(charId);
  return note;
}

/* Genera una nota con IA para un personaje. Si replyTo se da, la nota
 * es una "respuesta" a la nota de otro personaje (interacción entre ellos). */
async function generateNote(char,replyTo=null){
  const pid=char.providerId||DEF_PROVIDER;
  const mid=char.modelId||DEF_MODELS[pid];
  const apiKey=getKey(pid);
  if(!apiKey&&pid!=="claude")return null;

  // System prompt liviano: solo personalidad/ánimo, sin galería ni reglas de [SEND],
  // para no gastar tokens de más en una tarea de "escribe una frase corta".
  const base=`Vas a interpretar a ${char.name}, una persona real con esta personalidad: ${char.personality||"(personalidad casual, coherente y humana — improvísala)"}.${getEffectiveMood(char)?" Ahora mismo tu estado de ánimo es: "+getEffectiveMood(char)+".":""} Hablas en primera persona, nunca dices que eres una IA ni rompes el personaje.`;
  let prompt;
  if(replyTo){
    const author=state.chars.find(c=>c.id===replyTo.charId);
    prompt=`[Sistema interno: ${author?author.name:"otra persona"} acaba de publicar esta "nota" estilo Instagram (un mensaje cortito que aparece flotando sobre su foto de perfil, visible para sus contactos): "${replyTo.text}". Publica TÚ tu propia nota reaccionando o respondiendo a eso, de forma breve y natural, como lo harías en redes. Máximo ${NOTE_MAX_LEN} caracteres, una sola frase corta, sin comillas, sin hashtags, sin emojis excesivos. Responde SOLO con el texto de la nota.]`;
  }else{
    // Con alta confianza, a veces la nota es coqueta/romántica sobre el usuario (sutil)
    const trust=computeTrust(char.id);
    const aboutUser=(trust>=40 && Math.random()<0.45);
    const userHint=aboutUser
      ? " Si quieres, la nota puede ser sutilmente sobre la persona con quien más chateas (sin nombrarla — usa 'alguien', 'cierta persona', 'tú sabes quién', 'pensando en ti', etc.). Puede tener un toque coqueto o romántico si encaja con tu personalidad."
      : "";
    prompt=`[Sistema interno: publica una "nota" estilo Instagram — un mensaje cortito y casual que aparece flotando sobre tu foto de perfil para que tus contactos lo vean (como un estado de WhatsApp pero de una sola frase). Puede ser sobre lo que estás haciendo, pensando, sintiendo, una idea random, algo que te pasó, etc.${userHint} Máximo ${NOTE_MAX_LEN} caracteres, una sola frase corta, sin comillas, sin hashtags, sin emojis excesivos (0-1 está bien). Responde SOLO con el texto de la nota, nada más.]`;
  }

  try{
    const reply=await callAPI({providerId:pid,apiKey,modelId:mid,system:base,messages:[{id:"_note",role:"user",content:{type:"text",text:prompt}}],maxTokens:60});
    const{text}=parseReply(reply,[]);
    return text||null;
  }catch{return null;}
}

/* ═══════════════════════════════════════════════════════════
 * SISTEMA DE CELOS
 * Cuando un personaje publica una nota romántica/coqueta sobre
 * el usuario, otro personaje con confianza suficiente se entera
 * y le manda un mensaje directo al usuario reclamándole.
 *
 * Flujo:
 *  1. tickNotes genera una nota → llama checkJealousy(author, note)
 *  2. checkJealousy() usa IA para detectar si la nota es romántica
 *  3. Si sí, elige al personaje con más confianza como "celoso"
 *  4. triggerJealousyScene() genera el mensaje de reclamo y lo
 *     inyecta en el chat del personaje celoso (+ badge de no leído)
 * ═══════════════════════════════════════════════════════════ */

const JEALOUSY_COOLDOWN_MS = 25 * 60 * 1000;  // 25 min entre escenas
const JEALOUSY_TRUST_MIN   = 24;               // trust mínimo del celoso

function getLastJealousyTs(){ return Store.get("lastJealousy")||0; }
function setLastJealousyTs(){ Store.set("lastJealousy", Date.now()); }

/* Detecta si el texto de la nota es romántico/coqueto usando IA */
async function isRomanticNote(note, char){
  const pid=char.providerId||DEF_PROVIDER, mid=char.modelId||DEF_MODELS[pid];
  const apiKey=getKey(pid);
  if(!apiKey && pid!=="claude") return false;
  try{
    const reply=await callAPI({
      providerId:pid, apiKey, modelId:mid,
      system:"Clasificador. Responde SOLO con SI o NO.",
      messages:[{id:"_jdet",role:"user",content:{type:"text",text:
        `¿Esta frase corta de redes sociales expresa coqueteo, enamoramiento, deseo o afecto romántico hacia alguien? No cuenta si es algo neutro, filosófico o amistoso genérico.
Frase: "${note.text}"
Responde solo SI o NO.`
      }}], maxTokens:5,
    });
    const {text}=parseReply(reply,[]);
    return /^s[ií]/i.test((text||"").trim());
  }catch{ return false; }
}

/* Genera el mensaje de reclamo que le manda el personaje celoso al usuario */
async function generateJealousMessage(jealousChar, authorName, note){
  const pid=jealousChar.providerId||DEF_PROVIDER, mid=jealousChar.modelId||DEF_MODELS[pid];
  const apiKey=getKey(pid);
  if(!apiKey && pid!=="claude") return null;
  const base=`Eres ${jealousChar.name}. Personalidad: ${jealousChar.personality||"casual y real"}. ${jealousChar.mood?"Estado de ánimo: "+jealousChar.mood+".":""} Hablas en primera persona, nunca rompes el personaje.`;
  const prompt=`[Sistema interno — no lo menciones explícitamente]: Viste que ${authorName} publicó esta nota: "${note.text}". Parece estar dirigida al usuario con quien tú también tienes feeling. Escríbele UN mensaje corto y directo al usuario reclamándole o cuestionándolo — de forma natural y sutil, no digas "vi tu nota" literalmente; usa algo como "me enteré de algo…", "oye ¿qué pasa con ${authorName}?", "vi lo que puso…", etc. Tono: puede ser frío, herido, sarcástico o celoso según tu personalidad. Máximo 2 frases. Solo el texto del mensaje.]`;
  try{
    const reply=await callAPI({providerId:pid,apiKey,modelId:mid,system:base,
      messages:[{id:"_jmsg",role:"user",content:{type:"text",text:prompt}}],maxTokens:100});
    const {text}=parseReply(reply,[]);
    return (text||"").trim()||null;
  }catch{ return null; }
}

/* Inyecta el mensaje de celos en el chat del personaje celoso */
async function triggerJealousyScene(jealousChar, authorName, note){
  const msgText=await generateJealousMessage(jealousChar, authorName, note);
  if(!msgText) return;
  setLastJealousyTs();

  const botMsg={id:uid(), role:"assistant",
    content:{type:"text", text:msgText, _jealousy:true}, ts:Date.now()};

  // Persist into chat history
  const prev=state.chats[jealousChar.id]||[];
  const updated=[...prev, botMsg];
  state.chats[jealousChar.id]=updated;
  Store.set("chats",{...Store.get("chats")||{}, [jealousChar.id]:updated});

  // Bump unread badge
  const nu=getUnread(); nu[jealousChar.id]=(nu[jealousChar.id]||0)+1; setUnread(nu);

  // If this chat is currently open → append live
  if(window.__activeChatId===jealousChar.id && window.__activeChatAppend){
    window.__activeChatAppend(botMsg);
  }

  // Refresh home screen badge
  if(typeof rebuildHome==="function") try{rebuildHome();}catch{}
}

/* Master check called after each char note is posted */
async function checkJealousy(authorChar, note){
  if(state.chars.length < 2) return;
  if(Date.now() - getLastJealousyTs() < JEALOUSY_COOLDOWN_MS) return;
  if(Math.random() > 0.7) return; // 70% chance

  const romantic = await isRomanticNote(note, authorChar);
  if(!romantic) return;

  // Pick the most-trusting other char
  const candidates=state.chars
    .filter(c=>c.id!==authorChar.id && computeTrust(c.id)>=JEALOUSY_TRUST_MIN)
    .sort((a,b)=>computeTrust(b.id)-computeTrust(a.id));
  if(!candidates.length) return;

  const jealous=candidates[0];
  await delay(1800+Math.random()*2500);
  await triggerJealousyScene(jealous, authorChar.name, note);
}

/* ═══════════════════════════════════════════════════════════
 *  AUTONOMÍA ENTRE PERSONAJES — "CHISMES" / CHARLAS CRUZADAS
 *  Cuando hay 2+ personajes, de tanto en tanto uno de ellos le
 *  cuenta al usuario algo de una charla que tuvo con otro
 *  personaje (fuera de este chat) — dando la sensación de que
 *  los bots tienen vida propia y se relacionan entre ellos,
 *  no solo con el usuario. La reacción (buena onda, indiferencia,
 *  tensión, celos leves, etc.) la decide la IA según personalidad. */

const CHATTER_COOLDOWN_MS = 18 * 60 * 1000; // 18 min entre escenas
function getLastChatterTs(){ return Store.get("lastChatter")||0; }
function setLastChatterTs(){ Store.set("lastChatter", Date.now()); }

/* Genera el mensaje en el que `speaker` le cuenta al usuario algo
 * de su charla con `otherName`. La decisión de qué contar, con qué
 * tono y si le da importancia o no, queda 100% a criterio de la IA. */
async function generateChatterMessage(speaker, otherChar){
  const pid=speaker.providerId||DEF_PROVIDER, mid=speaker.modelId||DEF_MODELS[pid];
  const apiKey=getKey(pid);
  if(!apiKey && pid!=="claude") return null;
  const base=`Eres ${speaker.name}. Personalidad: ${speaker.personality||"casual y real"}. ${speaker.mood?"Estado de ánimo: "+speaker.mood+".":""} Hablas en primera persona, nunca rompes el personaje, nunca dices que eres una IA.`;
  const prompt=`[Sistema interno — no lo menciones explícitamente]: Hoy estuviste hablando un rato con ${otherChar.name} (otra persona que conoces, con su propia vida — personalidad: ${otherChar.personality||"alguien casual"}). Decide TÚ, según tu propia personalidad y cómo te llevás con ${otherChar.name}, qué le contás de eso al usuario: puede ser un dato random, un chisme, algo gracioso, algo que te molestó, una opinión sobre ${otherChar.name}, o directamente decidir que no es nada importante y mencionarlo de pasada sin darle vueltas. También podés mostrarte indiferente o quitarle importancia si no es algo que te interesa compartir. Escríbele al usuario 1 o 2 mensajes cortos y naturales (podés usar ||| entre ellos si son dos ideas separadas). Solo el texto, sin comillas, sin explicar el sistema.]`;
  try{
    const reply=await callAPI({providerId:pid,apiKey,modelId:mid,system:base,
      messages:[{id:"_chat",role:"user",content:{type:"text",text:prompt}}],maxTokens:140});
    const {parts}=parseReply(reply,[]);
    return parts.filter(Boolean);
  }catch{ return null; }
}

/* Inyecta la escena de chisme/charla cruzada en el chat de `speaker` */
async function triggerChatterScene(speaker, otherChar){
  const parts=await generateChatterMessage(speaker, otherChar);
  if(!parts||!parts.length) return;
  setLastChatterTs();

  const prev=state.chats[speaker.id]||[];
  let updated=prev;
  for(const p of parts){
    const botMsg={id:uid(), role:"assistant",
      content:{type:"text", text:p, _chatter:true}, ts:Date.now()};
    updated=[...updated, botMsg];
    state.chats[speaker.id]=updated;
    Store.set("chats",{...Store.get("chats")||{}, [speaker.id]:updated});
    if(window.__activeChatId===speaker.id && window.__activeChatAppend){
      window.__activeChatAppend(botMsg);
    }
  }

  const nu=getUnread(); nu[speaker.id]=(nu[speaker.id]||0)+parts.length; setUnread(nu);
  if(typeof rebuildHome==="function") try{rebuildHome();}catch{}
}

/* Tick de charlas cruzadas: con baja probabilidad y solo si hay 2+
 * personajes, elige uno al azar (que ya tenga conversación iniciada
 * con el usuario) para que le cuente algo sobre otro personaje. */
let _chatterTickRunning=false;
async function tickBotChatter(){
  if(_chatterTickRunning) return;
  if(state.chars.length < 2) return;
  if(Date.now() - getLastChatterTs() < CHATTER_COOLDOWN_MS) return;
  if(Math.random() > 0.35) return; // probabilidad por tick (cada ~30s)
  _chatterTickRunning=true;
  try{
    const started=state.chars.filter(c=>(state.chats[c.id]||[]).length>0);
    if(!started.length) return;
    const speaker=started[Math.floor(Math.random()*started.length)];
    const others=state.chars.filter(o=>o.id!==speaker.id);
    if(!others.length) return;
    const other=others[Math.floor(Math.random()*others.length)];
    await delay(500+Math.random()*1500);
    await triggerChatterScene(speaker, other);
  }finally{
    _chatterTickRunning=false;
  }
}

/* ═══════════════════════════════════════════════════════════
 *  CONFLICTOS ENTRE PERSONAJES
 *  Más allá del chisme tranquilo y de los celos románticos, a
 *  veces dos personajes directamente CHOCAN: compiten por la
 *  atención del usuario, se contradicen entre ellos sobre algo
 *  que dijeron, o uno queda picado con el otro. Esto se inyecta
 *  como un mensaje (o ráfaga) del personaje "afectado" en SU
 *  propio chat con el usuario — el tono y si le da importancia
 *  o no lo decide la IA según su personalidad. */

const CONFLICT_COOLDOWN_MS = 22 * 60 * 1000; // 22 min entre escenas
function getLastConflictTs(){ return Store.get("lastConflict")||0; }
function setLastConflictTs(){ Store.set("lastConflict", Date.now()); }

const CONFLICT_KINDS=[
  "competencia por atención: sentís que el usuario le da más bola a la otra persona y eso te molesta o te da gracia, según tu personalidad",
  "contradicción: la otra persona te contradijo o dijo algo distinto sobre un tema/plan que tenían en común, y no estás de acuerdo",
  "picazón leve: tuviste un cruce o malentendido tonto con la otra persona y quedaste con la espina",
  "comparación incómoda: notaste que el usuario los compara a los dos (a vos y a la otra persona) y no te cae del todo bien",
];

/* Genera el mensaje de conflicto que `speaker` le escribe al usuario
 * sobre `otherChar`. La decisión de si darle importancia, calmarse
 * solo/a, pedir que el usuario "elija bando", etc. es de la IA. */
async function generateConflictMessage(speaker, otherChar){
  const pid=speaker.providerId||DEF_PROVIDER, mid=speaker.modelId||DEF_MODELS[pid];
  const apiKey=getKey(pid);
  if(!apiKey && pid!=="claude") return null;
  const kind=CONFLICT_KINDS[Math.floor(Math.random()*CONFLICT_KINDS.length)];
  const base=`Eres ${speaker.name}. Personalidad: ${speaker.personality||"casual y real"}. ${getEffectiveMood(speaker)?"Estado de ánimo: "+getEffectiveMood(speaker)+".":""} Hablas en primera persona, nunca rompes el personaje, nunca dices que eres una IA.`;
  const prompt=`[Sistema interno — no lo menciones explícitamente]: Tuviste un roce con ${otherChar.name} (otra persona que también conoce el usuario, personalidad: ${otherChar.personality||"alguien casual"}). El tipo de roce es: ${kind}. Decide TÚ, según tu propia personalidad, cómo reaccionar frente al usuario: podés quejarte de ${otherChar.name}, pedirle indirectamente que tome partido, restarle importancia y cambiar de tema, ponerte celoso/a o competitivo/a, o reírte de la situación — lo que sea más realista para vos. No tiene que resolverse ni quedar prolijo, las personas reales no siempre resuelven sus conflictos rápido. Escríbele 1 o 2 mensajes cortos y naturales (podés usar ||| entre ellos). Solo el texto, sin comillas, sin explicar el sistema.]`;
  try{
    const reply=await callAPI({providerId:pid,apiKey,modelId:mid,system:base,
      messages:[{id:"_conf",role:"user",content:{type:"text",text:prompt}}],maxTokens:140});
    const {parts}=parseReply(reply,[]);
    return parts.filter(Boolean);
  }catch{ return null; }
}

/* Inyecta la escena de conflicto en el chat de `speaker` */
async function triggerConflictScene(speaker, otherChar){
  const parts=await generateConflictMessage(speaker, otherChar);
  if(!parts||!parts.length) return;
  setLastConflictTs();

  const prev=state.chats[speaker.id]||[];
  let updated=prev;
  for(const p of parts){
    const botMsg={id:uid(), role:"assistant",
      content:{type:"text", text:p, _conflict:true, _conflictWith:otherChar.id}, ts:Date.now()};
    updated=[...updated, botMsg];
    state.chats[speaker.id]=updated;
    Store.set("chats",{...Store.get("chats")||{}, [speaker.id]:updated});
    if(window.__activeChatId===speaker.id && window.__activeChatAppend){
      window.__activeChatAppend(botMsg);
    }
  }

  const nu=getUnread(); nu[speaker.id]=(nu[speaker.id]||0)+parts.length; setUnread(nu);
  if(typeof rebuildHome==="function") try{rebuildHome();}catch{}
}

/* Tick de conflictos: probabilidad baja, requiere 2+ personajes con
 * conversación iniciada. Elige uno como "afectado" y otro como
 * "causante" del roce. */
let _conflictTickRunning=false;
async function tickBotConflict(){
  if(_conflictTickRunning) return;
  if(state.chars.length < 2) return;
  if(Date.now() - getLastConflictTs() < CONFLICT_COOLDOWN_MS) return;
  if(Math.random() > 0.22) return; // menos frecuente que el chisme tranquilo
  _conflictTickRunning=true;
  try{
    const started=state.chars.filter(c=>(state.chats[c.id]||[]).length>0);
    if(started.length<2) return; // necesita al menos 2 con charla activa para que el roce tenga sentido
    const speaker=started[Math.floor(Math.random()*started.length)];
    const others=started.filter(o=>o.id!==speaker.id);
    if(!others.length) return;
    const other=others[Math.floor(Math.random()*others.length)];
    await delay(500+Math.random()*1500);
    await triggerConflictScene(speaker, other);
  }finally{
    _conflictTickRunning=false;
  }
}

/* ═══════════════════════════════════════════════════════════
 *  ALIANZAS ENTRE PERSONAJES
 *  Dos personajes se "ponen de acuerdo" en algo (una sorpresa,
 *  una broma, un plan) sin que el usuario sepa los detalles al
 *  principio. Primero llega una indirecta vaga de uno de ellos;
 *  un rato después se revela qué pasó, en el chat del otro (o
 *  del mismo), simulando que de verdad coordinaron algo juntos. */

function getAlliances(){ return Store.get("alliances")||[]; }
function setAlliances(v){ Store.set("alliances",v); }
const ALLIANCE_COOLDOWN_MS = 30*60*1000;
function getLastAllianceTs(){ return Store.get("lastAlliance")||0; }
function setLastAllianceTs(){ Store.set("lastAlliance",Date.now()); }

const ALLIANCE_IDEAS=[
  "organizar una sorpresa para el usuario (algo simple, como un mensaje conjunto o un gesto lindo)",
  "hacerle una broma inocente al usuario entre los dos",
  "ponerse de acuerdo para cubrirse mutuamente en algo que le van a contar al usuario",
  "coordinar para los dos hablarle el mismo día de algo en común, como si lo hubieran planeado",
];

/* Mensaje vago de charA insinuando que tiene un plan con charB, sin spoilear */
async function generateAllianceTeaser(speaker, otherChar, idea){
  const pid=speaker.providerId||DEF_PROVIDER, mid=speaker.modelId||DEF_MODELS[pid];
  const apiKey=getKey(pid);
  if(!apiKey && pid!=="claude") return null;
  const base=`Eres ${speaker.name}. Personalidad: ${speaker.personality||"casual y real"}. Hablas en primera persona, nunca rompes el personaje.`;
  const prompt=`[Sistema interno — no lo menciones explícitamente]: Te pusiste de acuerdo con ${otherChar.name} para ${idea}. NO reveles de qué se trata. Escríbele al usuario 1 mensaje corto insinuando que tenés un plan o secreto con ${otherChar.name}, generando intriga, sin contar el contenido. Ejemplo de tono: "tengo algo armado con ${otherChar.name}, ya vas a ver" — adaptalo a tu personalidad. Solo el texto.]`;
  try{
    const reply=await callAPI({providerId:pid,apiKey,modelId:mid,system:base,
      messages:[{id:"_at",role:"user",content:{type:"text",text:prompt}}],maxTokens:80});
    return (parseReply(reply,[]).text||"").trim()||null;
  }catch{ return null; }
}

/* Mensaje de revelación: qué pasó con el plan/sorpresa/broma */
async function generateAllianceReveal(speaker, otherChar, idea){
  const pid=speaker.providerId||DEF_PROVIDER, mid=speaker.modelId||DEF_MODELS[pid];
  const apiKey=getKey(pid);
  if(!apiKey && pid!=="claude") return null;
  const base=`Eres ${speaker.name}. Personalidad: ${speaker.personality||"casual y real"}. Hablas en primera persona, nunca rompes el personaje.`;
  const prompt=`[Sistema interno — no lo menciones explícitamente]: El plan que tenías con ${otherChar.name} era: ${idea}. Decide TÚ cómo salió (puede salir bien, salir mal, ser gracioso, ser un fracaso total) y contáselo al usuario de forma natural, como quien revela algo que armó con otra persona. Podés usar ||| si necesitás 2 mensajes cortos. Solo el texto.]`;
  try{
    const reply=await callAPI({providerId:pid,apiKey,modelId:mid,system:base,
      messages:[{id:"_ar",role:"user",content:{type:"text",text:prompt}}],maxTokens:140});
    return parseReply(reply,[]).parts.filter(Boolean);
  }catch{ return null; }
}

function injectBotMessages(charId, texts, flag){
  const prev=state.chats[charId]||[];
  let updated=prev;
  for(const t of texts){
    const m={id:uid(), role:"assistant", content:{type:"text", text:t, [flag]:true}, ts:Date.now()};
    updated=[...updated, m];
  }
  state.chats[charId]=updated;
  Store.set("chats",{...Store.get("chats")||{}, [charId]:updated});
  if(window.__activeChatId===charId && window.__activeChatAppend){
    for(const m of updated.slice(prev.length)) window.__activeChatAppend(m);
  }
  const nu=getUnread(); nu[charId]=(nu[charId]||0)+texts.length; setUnread(nu);
  if(typeof rebuildHome==="function") try{rebuildHome();}catch{}
}

async function startAlliance(charA, charB){
  const idea=ALLIANCE_IDEAS[Math.floor(Math.random()*ALLIANCE_IDEAS.length)];
  const teaser=await generateAllianceTeaser(charA, charB, idea);
  if(!teaser) return;
  setLastAllianceTs();
  injectBotMessages(charA.id, [teaser], "_alliance");

  const all=getAlliances();
  all.push({id:uid(), speakerId:charA.id, otherId:charB.id, idea, revealAt: Date.now()+(6+Math.random()*14)*60000, revealed:false});
  setAlliances(all);
}

/* Revisa si alguna alianza pendiente ya debe revelarse */
async function tickAllianceReveals(){
  const all=getAlliances();
  let changed=false;
  for(const a of all){
    if(a.revealed || Date.now() < a.revealAt) continue;
    const speaker=state.chars.find(c=>c.id===a.speakerId);
    const other=state.chars.find(c=>c.id===a.otherId);
    if(!speaker||!other){ a.revealed=true; changed=true; continue; }
    const parts=await generateAllianceReveal(speaker, other, a.idea);
    if(parts&&parts.length) injectBotMessages(speaker.id, parts, "_allianceReveal");
    a.revealed=true; changed=true;
  }
  if(changed) setAlliances(all.filter(a=>!a.revealed || Date.now()-a.revealAt < 24*60*60*1000));
}

let _allianceTickRunning=false;
async function tickBotAlliance(){
  if(_allianceTickRunning) return;
  _allianceTickRunning=true;
  try{
    await tickAllianceReveals();
    if(state.chars.length < 2) return;
    if(Date.now()-getLastAllianceTs() < ALLIANCE_COOLDOWN_MS) return;
    if(Math.random() > 0.18) return; // baja probabilidad
    const started=state.chars.filter(c=>(state.chats[c.id]||[]).length>0);
    if(started.length<2) return;
    const a=started[Math.floor(Math.random()*started.length)];
    const others=started.filter(o=>o.id!==a.id);
    const b=others[Math.floor(Math.random()*others.length)];
    await delay(500+Math.random()*1500);
    await startAlliance(a,b);
  }finally{
    _allianceTickRunning=false;
  }
}

/* Tick de notas: para cada personaje, si toca, genera y publica una nota.
 * Con cierta probabilidad, otro personaje "responde" con su propia nota. */
let _noteTickRunning=false;
async function tickNotes(){
  if(_noteTickRunning)return;
  if(state.chars.length<1)return;
  _noteTickRunning=true;
  try{
    for(const c of state.chars){
      initNotesMeta(c);
      if(!shouldPostNote(c))continue;
      const text=await generateNote(c);
      if(!text)continue;
      const note=pushNote(c.id,text);
      if(!note)continue;

      // Interacción entre personajes: si hay más de uno, otro personaje
      // puede "responder" a esta nota con la suya propia (visible para el usuario).
      if(state.chars.length>1 && Math.random()<0.5){
        const others=state.chars.filter(o=>o.id!==c.id);
        const responder=others[Math.floor(Math.random()*others.length)];
        await delay(800+Math.random()*1500);
        const rtext=await generateNote(responder,note);
        if(rtext) pushNote(responder.id,rtext,note.id);
      }

      // ── Escena de celos: ¿es esta nota romántica? ──
      // Se ejecuta en background sin bloquear el tick
      checkJealousy(c, note).catch(()=>{});
    }
  }finally{
    _noteTickRunning=false;
  }
}

  closeBtn.addEventListener("click",close);

  avWrap.style.cssText="position:relative;margin-top:6px";
  if(isUser){
    avWrap.appendChild(makeAv({name:"Tú",avatar:state.cfg.userAvatar},64));
  }else{

  }
  card.appendChild(avWrap);

  const bubble=document.createElement("div");

  bubble.textContent=note.text;
  card.appendChild(bubble);

  const nameEl=document.createElement("div");
  nameEl.style.cssText="font-weight:700;font-size:14px;color:#fff;margin-top:2px";
  nameEl.textContent=isUser?"Tú":entity.name;
  card.appendChild(nameEl);

  const timeEl=document.createElement("div");
  timeEl.style.cssText="font-size:11px;color:#888";
  timeEl.textContent=formatTime(note.ts);
  card.appendChild(timeEl);

  // Si esta nota es respuesta a la de otro personaje, mostrar contexto
  if(note.replyToId){
    const orig=getNotes().find(n=>n.id===note.replyToId);
    if(orig){
      const origAuthor=orig.charId==="user"?null:state.chars.find(c=>c.id===orig.charId);
      const ctx=document.createElement("div");
      ctx.style.cssText="font-size:11px;color:#999;text-align:center;border-top:1px solid #2a2a2a;padding-top:10px;margin-top:2px;width:100%";
      ctx.textContent=`En respuesta a la nota de ${origAuthor?origAuthor.name:"Tú"}: "${orig.text}"`;
      card.appendChild(ctx);
    }
  }

  // Acciones
  const actions=document.createElement("div");
  actions.style.cssText="display:flex;gap:10px;width:100%;margin-top:6px";
  if(!isUser){
    const chatBtn=IGBtn("💬 Responder en el chat",true);
    chatBtn.style.flex="1";
    chatBtn.addEventListener("click",()=>{
      closeNotesOverlay();
      const nu=getUnread();nu[entity.id]=0;setUnread(nu);
      nav("chat",entity);
    });
    actions.appendChild(chatBtn);
  }else{
    const editBtn=IGBtn("🗑️ Borrar nota",false);
    editBtn.style.flex="1";
    editBtn.addEventListener("click",()=>{
      setNotes(getNotes().filter(n=>n.id!==note.id));
      close();
    });
    actions.appendChild(editBtn);
  }
  card.appendChild(actions);

  backdrop.appendChild(card);
  backdrop.addEventListener("click",close);
  overlay.appendChild(backdrop);
}

  const overlay=document.getElementById("story-overlay");
  overlay.innerHTML="";
  overlay.className="open";

  const backdrop=document.createElement("div");
  backdrop.style.cssText="position:absolute;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:16px";

  const card=document.createElement("div");
  card.style.cssText="background:#1a1a1a;border-radius:20px;padding:22px 20px;max-width:320px;width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;position:relative;border:1px solid #2a2a2a";
  card.addEventListener("click",e=>e.stopPropagation());

  const closeBtn=document.createElement("button");
  closeBtn.textContent="✕";
  closeBtn.style.cssText="position:absolute;top:10px;right:10px;background:none;border:none;color:#888;font-size:18px;width:30px;height:30px;border-radius:50%";
  closeBtn.addEventListener("click",close);
  card.appendChild(closeBtn);

  card.appendChild(makeAv({name:"Tú",avatar:state.cfg.userAvatar},64));

  const title=document.createElement("div");
  title.style.cssText="font-weight:700;font-size:15px;color:#fff";
  title.textContent="Nueva nota";
  card.appendChild(title);

  const sub=document.createElement("div");
  sub.style.cssText="font-size:12px;color:#888;text-align:center";
  sub.textContent="Comparte qué estás pensando. Tus personajes podrán verla.";
  card.appendChild(sub);

  const input=document.createElement("textarea");
  input.maxLength=NOTE_MAX_LEN;
  input.rows=2;
  input.placeholder="¿Qué estás pensando?";
  input.style.cssText="width:100%;background:#262626;border:1px solid #333;border-radius:14px;padding:10px 14px;color:#fff;font-size:14px;outline:none;font-family:inherit;resize:none";
  const existing=getLatestNote("user");
  if(existing)input.value=existing.text;
  card.appendChild(input);

  const counter=document.createElement("div");
  counter.style.cssText="font-size:11px;color:#666;align-self:flex-end;margin-top:-8px";
  function updCounter(){counter.textContent=input.value.length+"/"+NOTE_MAX_LEN;}
  input.addEventListener("input",updCounter);
  updCounter();
  card.appendChild(counter);

  const postBtn=IGBtn("Compartir",true);
  postBtn.style.width="100%";
  postBtn.addEventListener("click",()=>{
    const txt=input.value.trim();
    if(!txt)return;
    const userNote=pushNote("user",txt);
    close();
    // If user's note is romantic, a jealous char might message them
    if(userNote && state.chars.length>=1){
      (async()=>{
        if(Date.now()-getLastJealousyTs()<JEALOUSY_COOLDOWN_MS) return;
        if(Math.random()>0.55) return;
        const proxyChar=state.chars[0];
        const romantic=await isRomanticNote(userNote,proxyChar).catch(()=>false);
        if(!romantic) return;
        const candidates=state.chars
          .filter(c=>computeTrust(c.id)>=JEALOUSY_TRUST_MIN)
          .sort((a,b)=>computeTrust(b.id)-computeTrust(a.id));
        if(!candidates.length) return;
        await delay(2000+Math.random()*3000);
        await triggerJealousyScene(candidates[0],"alguien",userNote).catch(()=>{});
      })();
    }
  });
  card.appendChild(postBtn);

  backdrop.appendChild(card);
  backdrop.addEventListener("click",close);
  overlay.appendChild(backdrop);
  setTimeout(()=>input.focus(),50);
}

/* ─── STORY VIEWER ────────────────────────────────────────── */
let storyViewerState = null;

function openStoryViewer(chars, startCharIdx=0){
  // chars = array of chars that have stories
  const overlay = document.getElementById("story-overlay");
  overlay.innerHTML = "";
  overlay.className = "open";

  // Filter chars with visible stories
  const charsWithStories = chars.filter(c=>getCharStories(c.id).length>0);
  if(!charsWithStories.length){ overlay.className=""; return; }

  let charIdx = Math.min(startCharIdx, charsWithStories.length-1);
  let storyIdx = 0;
  let progressAnim = null;
  let paused = false;

  function currentChar(){ return charsWithStories[charIdx]; }
  function currentStories(){ return getCharStories(currentChar().id); }
  function currentStory(){ return currentStories()[storyIdx]; }

  function markSeen(story){
    const seen = getSeenStories();
    seen[story.id] = true;
    setSeenStories(seen);
  }

  function goNext(){
    if(storyIdx < currentStories().length - 1){
      storyIdx++;
      renderStory();
    } else if(charIdx < charsWithStories.length - 1){
      charIdx++;
      storyIdx = 0;
      renderStory();
    } else {
      closeViewer();
    }
  }

  function goPrev(){
    if(storyIdx > 0){ storyIdx--; renderStory(); }
    else if(charIdx > 0){ charIdx--; storyIdx = Math.max(0,currentStories().length-1); renderStory(); }
  }

  function closeViewer(){
    if(progressAnim){ clearTimeout(progressAnim); progressAnim=null; }
    overlay.className = "";
    overlay.innerHTML = "";
    storyViewerState = null;
    render();
  }

  function renderStory(){
    if(progressAnim){ clearTimeout(progressAnim); progressAnim=null; }
    overlay.innerHTML = "";
    const char = currentChar();
    const story = currentStory();
    const stories = currentStories();
    markSeen(story);

    // Background image/video
    const bg = document.createElement("div");
    bg.style.cssText = "position:absolute;inset:0;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden";
    if(story.mediaType==="video"){
      const vid = document.createElement("video");
      vid.src = story.mediaUrl;
      vid.autoplay = true;
      vid.loop = true;
      vid.muted = false;
      vid.style.cssText = "width:100%;height:100%;object-fit:cover";
      bg.appendChild(vid);
    } else {
      const img = document.createElement("img");
      img.src = story.mediaUrl;
      img.style.cssText = "width:100%;height:100%;object-fit:contain";
      bg.appendChild(img);
    }
    // Dim overlay
    const dim = document.createElement("div");
    dim.style.cssText = "position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.55) 0%,transparent 30%,transparent 70%,rgba(0,0,0,.7) 100%)";
    bg.appendChild(dim);
    overlay.appendChild(bg);

    // Progress bars
    const progressRow = document.createElement("div");
    progressRow.style.cssText = "position:absolute;top:10px;left:12px;right:12px;display:flex;gap:3px;z-index:2";
    stories.forEach((s,i)=>{
      const track = document.createElement("div");
      track.style.cssText = "flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden";
      const bar = document.createElement("div");
      bar.className = "story-progress-bar";
      if(i < storyIdx) bar.style.width="100%";
      else if(i === storyIdx){
        bar.style.width="0%";
        bar.style.animation = "storyProgress 5s linear forwards";
        progressAnim = setTimeout(()=>{ if(!paused) goNext(); }, 5000);
      } else bar.style.width="0%";
      track.appendChild(bar);
      progressRow.appendChild(track);
    });
    overlay.appendChild(progressRow);

    // Header: avatar + name + time + close
    const hdr = document.createElement("div");
    hdr.style.cssText = "position:absolute;top:22px;left:12px;right:12px;display:flex;align-items:center;gap:9px;z-index:3";
    const avWrap = document.createElement("div");
    avWrap.style.cssText = story.isCF
      ? "background:linear-gradient(135deg,#22c55e,#16a34a);padding:2px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center"
      : "background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);padding:2px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center";
    const avFrame = document.createElement("div");
    avFrame.style.cssText = "border-radius:50%;border:2px solid #000;overflow:hidden;display:flex;align-items:center;justify-content:center";
    const avEl = IGAvatar(char, 34, false);
    avEl.style.cssText += ";flex-shrink:0";
    avFrame.appendChild(avEl);
    avWrap.appendChild(avFrame);
    hdr.appendChild(avWrap);

    const nameWrap = document.createElement("div");
    nameWrap.style.cssText = "flex:1;min-width:0";
    const nameEl = document.createElement("div");
    nameEl.style.cssText = "font-weight:700;font-size:14px;color:#fff;display:flex;align-items:center;gap:6px";
    nameEl.textContent = char.name;
    if(story.isCF){
      const cfBadge = document.createElement("span");
      cfBadge.className = "cf-badge";
      cfBadge.textContent = "★ Amigos cercanos";
      nameEl.appendChild(cfBadge);
    }
    const timeEl = document.createElement("div");
    const diff = Date.now()-story.ts;
    const minsAgo = Math.max(1,Math.round(diff/60000));
    timeEl.style.cssText = "font-size:11px;color:rgba(255,255,255,.65);margin-top:1px";
    timeEl.textContent = minsAgo<60 ? minsAgo+"m" : Math.round(minsAgo/60)+"h";
    nameWrap.appendChild(nameEl);
    nameWrap.appendChild(timeEl);
    hdr.appendChild(nameWrap);

    const closeBtn = document.createElement("button");
    closeBtn.style.cssText = "background:rgba(0,0,0,.35);border:none;color:#fff;font-size:20px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0";
    closeBtn.textContent = "✕";
    closeBtn.addEventListener("click", closeViewer);
    hdr.appendChild(closeBtn);
    overlay.appendChild(hdr);

    // Caption
    if(story.caption){
      const cap = document.createElement("div");
      cap.style.cssText = "position:absolute;bottom:80px;left:16px;right:16px;color:#fff;font-size:15px;text-align:center;text-shadow:0 1px 6px rgba(0,0,0,.8);z-index:3;word-break:break-word;white-space:pre-wrap";
      cap.textContent = story.caption;
      overlay.appendChild(cap);
    }

    // Bottom: reply bar
    const replyBar = document.createElement("div");
    replyBar.style.cssText = "position:absolute;bottom:16px;left:16px;right:16px;display:flex;gap:10px;align-items:center;z-index:3";
    const replyInp = document.createElement("input");
    replyInp.placeholder = "Responder a " + char.name + "…";
    replyInp.style.cssText = "flex:1;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);border-radius:22px;padding:10px 16px;color:#fff;font-size:14px;outline:none;font-family:inherit";
    replyInp.addEventListener("focus", ()=>{ paused=true; if(progressAnim){clearTimeout(progressAnim);progressAnim=null;} });
    replyInp.addEventListener("keydown", e=>{
      if(e.key==="Enter" && replyInp.value.trim()){
        const txt = replyInp.value.trim();
        closeViewer();
        // Navigate to chat and send reply
        state.sel=char; state.screen="chat";
        render();
        // Inject reply after a tick
        setTimeout(()=>{
          const inp = document.querySelector("textarea[placeholder='Mensaje…']");
          if(inp){ inp.value="[Historia] "+txt; inp.dispatchEvent(new Event("input")); }
        },300);
      }
    });
    const heartStory = document.createElement("button");
    heartStory.style.cssText = "background:none;border:none;font-size:26px;color:#ed4956;cursor:pointer;flex-shrink:0;transition:transform .1s";
    heartStory.textContent = "♥";
    heartStory.addEventListener("click",()=>{ heartStory.style.transform="scale(1.4)"; setTimeout(()=>heartStory.style.transform="scale(1)",200); });
    replyBar.appendChild(replyInp);
    replyBar.appendChild(heartStory);
    overlay.appendChild(replyBar);

    // Tap zones
    const leftZone = document.createElement("div");
    leftZone.style.cssText = "position:absolute;left:0;top:0;width:35%;height:85%;z-index:4;cursor:pointer";
    leftZone.addEventListener("click", goPrev);
    const rightZone = document.createElement("div");
    rightZone.style.cssText = "position:absolute;right:0;top:0;width:65%;height:85%;z-index:4;cursor:pointer";
    rightZone.addEventListener("click", goNext);
    overlay.appendChild(leftZone);
    overlay.appendChild(rightZone);
  }

  renderStory();
}

/* ─── CLOSE FRIENDS NOTIFICATION ─────────────────────────── */
function checkCFUnlock(){
  const cf = getCFStatus();
  const prev = Store.get("cfPrev")||{};
  for(const c of state.chars){
    if(cf[c.id] && !prev[c.id]){
      prev[c.id]=true;
      Store.set("cfPrev",prev);
      // Show a toast
      showToast(`⭐ ${c.name} te añadió a amigos cercanos`, "#16a34a");
    }
  }
}

function showToast(msg, color="#7C3AED"){
  const t = document.createElement("div");
  t.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:${color};color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.5);white-space:nowrap;animation:fadeUp .3s ease-out`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

function IGAvatar(char, size=44, showRing=false){
  const wrap = el("div",{style:{position:"relative",flexShrink:"0",width:size+"px",height:size+"px"}});
  const inner = el("div",{style:{
    width:size+"px", height:size+"px", borderRadius:"50%", padding: showRing?"2px":"0",
    background: showRing ? IG_GRAD : "transparent", flexShrink:"0",
  }});
  if(char?.avatar?.type==="image"&&char.avatar.url){
    const img = el("img",{src:char.avatar.url,alt:"",style:{
      width:(showRing?size-4:size)+"px", height:(showRing?size-4:size)+"px",
      borderRadius:"50%", objectFit:"cover", display:"block",
      border: showRing ? "2px solid #000" : "none",
    }});
    inner.appendChild(img);
  } else {
    const av = (char?.avatar?.type==="initials"?char.avatar:null)||initAv(char?.name||"?");
    const d = el("div",{style:{
      width:(showRing?size-4:size)+"px", height:(showRing?size-4:size)+"px",
      borderRadius:"50%", background:av.color,
      display:"flex",alignItems:"center",justifyContent:"center",
      color:"#fff", fontWeight:"700", fontSize:Math.round(size*.36)+"px",
      border: showRing ? "2px solid #000" : "none",
    }}, av.text);
    inner.appendChild(d);
  }
  wrap.appendChild(inner);
  return wrap;
}

    const newStory = el("div",{style:{

function formatTime(ts){
  if(!ts)return"";
  const d=new Date(ts), now=new Date();
  const diff = now-d;
  if(diff<60000) return "ahora";
  if(diff<3600000) return Math.floor(diff/60000)+"min";
  if(d.toDateString()===now.toDateString()) return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");
  return d.getDate()+"/"+(d.getMonth()+1);
}
